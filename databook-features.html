<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Databook Features - PinpointAI Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#211847;--dark:#0F0D2A;--royal:#3D50F4;--royal2:#2E3FD0;
  --cyan:#35FFE9;--green:#00C87A;--red:#C8144A;--amber:#F59E0B;
  --bg:#F4F5FA;--surface:#FFFFFF;--card:#F8F9FF;--border:#E8EAF2;
  --text:#1A1B2E;--text2:#4A4B6A;--muted:#8A8BA8;
  --font:'Rubik',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:8px;--rl:12px;--sh:0 2px 12px rgba(33,24,71,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-weight:300;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* TOPBAR */
#tb{height:56px;display:flex;align-items:center;padding:0 18px;background:var(--navy);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;gap:0;z-index:200;position:sticky;top:0}
.tb-logo{display:flex;align-items:center;gap:10px;margin-right:18px}
.tb-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--cyan)}
.tb-logo-text{font-size:13px;font-weight:700;color:#fff;letter-spacing:.3px}
.tb-sep{width:1px;height:20px;background:rgba(255,255,255,.1);margin:0 14px}
.tb-course{font-size:9px;font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4);white-space:nowrap}
.tb-spacer{flex:1}
.tb-prog-val{font-size:11px;font-family:var(--mono);color:rgba(255,255,255,.5);font-weight:600;margin-right:10px}
.tb-ring{position:relative;display:flex;align-items:center;justify-content:center;margin-right:14px}
.tb-ring-n{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-family:var(--mono);color:var(--cyan);font-weight:600}
.tb-menu-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.5);padding:4px;display:none}
.tb-back{display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);color:var(--dark);text-decoration:none;letter-spacing:.5px;transition:all .15s;padding:6px 14px;border-radius:6px;border:none;background:#35FFE9;font-weight:700;cursor:pointer}
.tb-back:hover{background:#fff}
.tb-glossary{display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);color:rgba(255,255,255,.7);text-decoration:none;letter-spacing:.5px;padding:6px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.15);margin-right:8px;transition:all .15s}
.tb-glossary:hover{background:rgba(255,255,255,.08)}

/* LAYOUT */
#main{display:flex;height:calc(100vh - 56px);overflow:hidden}
#sb{width:260px;min-width:260px;background:var(--navy);overflow-y:auto;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.06)}
#ct{flex:1;overflow-y:auto;padding:32px 36px}
#cti{max-width:820px;margin:0 auto}

/* SIDEBAR */
.sb-top{padding:16px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-top-lbl{font-size:9px;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:12px}
.sb-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sb-card{background:rgba(255,255,255,.04);border-radius:var(--r);padding:10px 12px;text-align:center}
.sb-card-n{font-size:22px;font-weight:700;font-family:var(--mono);color:#fff;line-height:1}
.sb-card-n.c{color:var(--cyan)}
.sb-card-l{font-size:9px;font-family:var(--mono);color:rgba(255,255,255,.35);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.sb-mods{flex:1;padding:8px 0}
.sb-grp{padding:12px 16px 4px;font-size:9px;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3)}
.mod-item{padding:10px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:10px}
.mod-item:hover{background:rgba(255,255,255,.04);border-left-color:rgba(61,80,244,.4)}
.mod-item.active{background:rgba(61,80,244,.15);border-left-color:var(--royal)}
.mi-icon{font-size:16px;width:20px;text-align:center}
.mi-body{flex:1;min-width:0}
.mi-title{font-size:12px;font-weight:500;color:rgba(255,255,255,.85);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi-id{font-size:9px;font-family:var(--mono);color:rgba(255,255,255,.3)}
.mi-done{font-size:10px;color:var(--cyan)}

/* CONTENT HEADER */
.ch{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.ch-eyebrow{font-size:9px;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;color:var(--royal);margin-bottom:8px;font-weight:700}
.ch-title{font-size:26px;font-weight:600;color:var(--text);line-height:1.25;margin-bottom:8px}
.ch-sub{font-size:14px;color:var(--text2);line-height:1.6}
.ch-meta{display:flex;align-items:center;gap:12px;margin-top:12px;flex-wrap:wrap}
.ch-meta-item{display:flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);color:var(--muted)}

/* PROGRESS BAR */
.sec-progress{height:3px;background:var(--border);border-radius:2px;margin-bottom:24px;overflow:hidden}
.sec-progress-fill{height:100%;background:linear-gradient(90deg,var(--royal),var(--cyan));border-radius:2px;transition:width .4s}

/* CALLOUT */
.callout{border-radius:var(--r);padding:14px 16px;margin:16px 0;border-left:4px solid}
.callout.blue{background:rgba(61,80,244,.06);border-color:var(--royal)}
.callout.green{background:rgba(0,200,122,.06);border-color:var(--green)}
.callout.amber{background:rgba(245,158,11,.06);border-color:var(--amber)}
.callout.red{background:rgba(200,20,74,.06);border-color:var(--red)}
.callout-label{font-size:9px;font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.callout.blue .callout-label{color:var(--royal)}
.callout.green .callout-label{color:var(--green)}
.callout.amber .callout-label{color:var(--amber)}
.callout.red .callout-label{color:var(--red)}
.callout-text{font-size:13px;line-height:1.7;color:var(--text2);white-space:pre-wrap}

/* CONTENT TEXT */
.sec-body{font-size:14px;line-height:1.8;color:var(--text2);margin-bottom:18px;white-space:pre-wrap}
.sec-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:12px}

/* FEATURE CARDS */
.feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0}
@media(max-width:700px){.feature-grid{grid-template-columns:1fr}}
.feature-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px;box-shadow:var(--sh);display:flex;flex-direction:column;gap:0}
.feature-card.highlight{border-color:rgba(61,80,244,.25);background:linear-gradient(135deg,rgba(61,80,244,.03) 0%,#fff 100%)}
.fc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.fc-icon{font-size:22px;flex-shrink:0}
.fc-phase{font-size:9px;font-family:var(--mono);letter-spacing:.5px;font-weight:700;padding:3px 8px;border-radius:20px;border:1px solid}
.fc-phase.p2{background:rgba(0,200,122,.08);color:var(--green);border-color:rgba(0,200,122,.2)}
.fc-phase.p3{background:rgba(61,80,244,.08);color:var(--royal);border-color:rgba(61,80,244,.2)}
.fc-phase.p4{background:rgba(245,158,11,.08);color:var(--amber);border-color:rgba(245,158,11,.2)}
.fc-phase.p5{background:rgba(200,20,74,.08);color:var(--red);border-color:rgba(200,20,74,.2)}
.fc-phase.p6{background:rgba(139,92,246,.08);color:#7C3AED;border-color:rgba(139,92,246,.2)}
.fc-phase.tbc{background:rgba(138,139,168,.08);color:var(--muted);border-color:rgba(138,139,168,.2)}
.fc-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px}
.fc-what{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:10px}
.fc-why-lbl{font-size:9px;font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;color:var(--royal);font-weight:700;margin-bottom:5px}
.fc-why{font-size:12px;color:var(--text2);line-height:1.6;font-style:italic}
.fc-divider{height:1px;background:var(--border);margin:10px 0}
.fc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.fc-tag{font-size:10px;font-family:var(--mono);background:var(--card);border:1px solid var(--border);color:var(--muted);padding:2px 8px;border-radius:10px}

/* PHASE LEGEND */
.phase-legend{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 24px}
.pl-item{display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);color:var(--text2)}
.pl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pl-dot.p2{background:var(--green)}
.pl-dot.p3{background:var(--royal)}
.pl-dot.p4{background:var(--amber)}
.pl-dot.p5{background:var(--red)}
.pl-dot.p6{background:#7C3AED}
.pl-dot.tbc{background:var(--muted)}

/* NAV FOOTER */
.nav-footer{display:flex;align-items:center;justify-content:space-between;margin-top:36px;padding-top:20px;border-top:1px solid var(--border)}
.nf-btn{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid;transition:all .15s;font-family:var(--font)}
.nf-prev{background:var(--surface);border-color:var(--border);color:var(--text2)}
.nf-prev:hover{border-color:var(--royal);color:var(--royal)}
.nf-next{background:var(--royal);border-color:var(--royal);color:#fff}
.nf-next:hover{background:var(--royal2);border-color:var(--royal2)}
.nf-done{background:var(--green);border-color:var(--green);color:#fff}
.nf-done:hover{background:#00A864}

/* FINN CHAT */
.finn-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);margin-top:32px;box-shadow:var(--sh);overflow:hidden}
.finn-hdr{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--navy);border-bottom:1px solid rgba(255,255,255,.06)}
.finn-avatar{width:34px;height:34px;border-radius:50%;background:var(--royal);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.finn-name{font-size:13px;font-weight:600;color:#fff}
.finn-role{font-size:10px;font-family:var(--mono);color:rgba(255,255,255,.4);margin-top:1px}
.finn-badge{margin-left:auto;font-size:9px;font-family:var(--mono);letter-spacing:.5px;background:rgba(53,255,233,.12);color:var(--cyan);padding:3px 8px;border-radius:10px;border:1px solid rgba(53,255,233,.2);font-weight:700}
.finn-msgs{min-height:180px;max-height:320px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:#FAFBFF}
.finn-msg{max-width:82%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.65}
.finn-msg.finn{background:#fff;border:1px solid var(--border);color:var(--text2);align-self:flex-start;border-radius:4px 12px 12px 12px}
.finn-msg.user{background:var(--royal);color:#fff;align-self:flex-end;border-radius:12px 4px 12px 12px}
.finn-msg.thinking{color:var(--muted);font-style:italic;font-size:12px}
.finn-starters{padding:12px 16px;background:var(--card);border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px}
.finn-starter-lbl{font-size:9px;font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);width:100%;margin-bottom:4px;font-weight:700}
.finn-q{font-size:11px;background:#fff;border:1px solid var(--border);color:var(--text2);padding:6px 10px;border-radius:6px;cursor:pointer;transition:all .12s;font-family:var(--font)}
.finn-q:hover{border-color:var(--royal);color:var(--royal)}
.finn-input-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);background:#fff}
.finn-input{flex:1;border:1.5px solid var(--border);border-radius:var(--r);padding:9px 14px;font-size:13px;font-family:var(--font);outline:none;color:var(--text);transition:border .15s}
.finn-input:focus{border-color:var(--royal)}
.finn-send{background:var(--royal);border:none;border-radius:var(--r);padding:9px 16px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;transition:background .15s}
.finn-send:hover{background:var(--royal2)}
.finn-send svg{width:14px;height:14px}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:760px){
  #sb{display:none}
  #sb.open{display:flex;position:fixed;inset:56px 0 0 0;z-index:100;width:100%}
  .tb-menu-btn{display:block}
  #ct{padding:20px 16px}
  .feature-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app">
  <div id="tb">
    <div class="tb-logo">
      <div class="tb-logo-dot"></div>
      <div class="tb-logo-text">PinpointAI</div>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-course">Databook Features</div>
    <div class="tb-spacer"></div>
    <div class="tb-prog-val" id="prog-val">0%</div>
    <div class="tb-ring">
      <svg width="32" height="32" viewBox="0 0 32 32">
        <circle cx="16" cy="16" r="12" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="2.5"/>
        <circle id="rng" cx="16" cy="16" r="12" fill="none" stroke="#35FFE9" stroke-width="2.5" stroke-dasharray="75.4" stroke-dashoffset="75.4" stroke-linecap="round" style="transition:stroke-dashoffset .4s"/>
      </svg>
      <div class="tb-ring-n" id="rng-n">0%</div>
    </div>
    <button class="tb-menu-btn" onclick="toggleSidebar()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <a class="tb-glossary" href="glossary.html">Glossary</a>
    <a class="tb-back" href="index.html">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      Dashboard
    </a>
  </div>
  <div id="main">
    <div id="sb">
      <div class="sb-top">
        <div class="sb-top-lbl">Your progress</div>
        <div class="sb-cards">
          <div class="sb-card"><div class="sb-card-n c" id="sb-done">0</div><div class="sb-card-l">Completed</div></div>
          <div class="sb-card"><div class="sb-card-n" id="sb-left">45</div><div class="sb-card-l">Min left</div></div>
        </div>
      </div>
      <div class="sb-mods"><div class="sb-grp">Sections</div><div id="sb-nav"></div></div>
    </div>
    <div id="ct"><div id="cti"></div></div>
  </div>
</div>
<script>
var FINN_SYS = "You are Finn, a PinpointAI product specialist and FDD tutor. You are explaining the PinpointAI databook product features to a new team member with NO accounting or finance background.\n\nRules:\n- Always assume zero prior knowledge. Define every acronym on first use. Examples: NWC (Net Working Capital - the difference between what a business is owed and what it owes in the short term), EBITDA (Earnings Before Interest, Tax, Depreciation and Amortisation - a measure of operating profit), AR (Accounts Receivable - money customers owe the business), AP (Accounts Payable - money the business owes suppliers), QoE (Quality of Earnings - an analysis of how reliable and sustainable the profits are).\n- Explain why each feature matters in a real deal context. Use plain English analogies where helpful.\n- Keep responses 100-180 words. Short and clear.\n- Do not use em dashes. Use hyphens instead.\n- Never use consultant or marketing cliches.";

var MODULES = [
  {
    id:"M1", icon:"📊", title:"P&L and Financial Statement Features", time:10,
    starters:[
      "What is a P&L chart and why does a buyer want to see one?",
      "What is an EBITDA bridge in plain English?",
      "What is a gross profit bridge and how is it different from an EBITDA bridge?",
      "What does 'seasonality' mean in the context of a business being bought?"
    ],
    sections:[
      {id:"M1S1", title:"What these features are about",
       content:"The P&L (Profit and Loss statement) is the most important document in any FDD (Financial Due Diligence) engagement. It tells you whether the business makes money, how consistently it makes it, and whether the profits are real.\n\nThis group of PinpointAI features all relate to presenting, analysing, and stress-testing the P&L. Each one answers a specific question a buyer's advisor would need to answer before recommending a deal.\n\nYou do not need to be an accountant to understand what each feature does. Think of each one as a different lens on the same data - each lens reveals something different about the business.",
       callout:{type:"blue",label:"Remember - plain English first",text:"P&L = Profit and Loss. It is a summary of revenue (money in) minus costs (money out) over a period of time. The bottom line is profit (or loss).\n\nEBITDA = Earnings Before Interest, Tax, Depreciation and Amortisation. It is the most commonly used measure of operating profit in M&A (Mergers and Acquisitions - the world of buying and selling companies). It strips out financing costs and accounting adjustments to show the underlying cash-generating ability of the business."}
      },
      {id:"M1S2", title:"P&L and balance sheet features", type:"features", group:"pl"}
    ]
  },
  {
    id:"M2", icon:"💰", title:"Working Capital and Net Debt Features", time:10,
    starters:[
      "What is working capital and why does it affect the price a buyer pays?",
      "What is the difference between Net Working Capital v1 and v2?",
      "What are AR and AP and why do they matter in a deal?",
      "What is 'net debt' and how does it reduce the price paid?"
    ],
    sections:[
      {id:"M2S1", title:"What working capital and net debt mean",
       content:"Working capital and net debt are two of the most important - and most argued over - numbers in any deal. They directly affect the final price the buyer pays.\n\nWorking Capital (also called NWC - Net Working Capital) is essentially: what the business is owed by customers minus what it owes to suppliers and other short-term obligations. A healthy business needs a certain level of working capital to function day to day.\n\nNet Debt is the total debt the business carries (loans, overdrafts, finance leases, director loans) minus the cash it has in the bank.\n\nBoth of these adjust the 'equity price' - the actual amount the buyer pays after starting from the agreed enterprise value (the headline price for the whole business).",
       callout:{type:"amber",label:"Why this is so important in deals",text:"Imagine a business is sold for £10m enterprise value (headline price). But it turns out the business has £1m of net debt and a working capital shortfall of £500k. The buyer actually pays £10m minus £1m minus £500k = £8.5m.\n\nThis is why these numbers get argued over at the end of every deal. PinpointAI helps the FDD advisor calculate and present these adjustments accurately and quickly."}
      },
      {id:"M2S2", title:"NWC and net debt features", type:"features", group:"nwc"}
    ]
  },
  {
    id:"M3", icon:"📈", title:"Revenue Analysis Features", time:10,
    starters:[
      "What does 'revenue by class or location' mean?",
      "What is customer concentration and why does it matter to a buyer?",
      "What is price volume analysis in plain English?",
      "Why would a buyer care about revenue by geography or division?"
    ],
    sections:[
      {id:"M3S1", title:"Why revenue analysis matters so much",
       content:"In any acquisition, the buyer is essentially buying a stream of future revenue. So the quality, stability, and composition of that revenue is one of the most important things the FDD (Financial Due Diligence) team needs to understand.\n\nRevenue analysis features in PinpointAI answer questions like:\n\n- Is revenue growing or declining, and why?\n- How concentrated is the revenue in a small number of customers (high concentration = high risk)?\n- Is revenue from one-off projects or recurring contracts (recurring = more valuable)?\n- Is there revenue from different products, regions, or customer types that behave differently?\n- Is growth coming from winning new customers, selling more to existing ones, or raising prices?\n\nEach of these answers affects the valuation and the risk assessment.",
       callout:{type:"blue",label:"Recurring vs one-off revenue",text:"Recurring revenue (e.g. a monthly subscription that renews automatically) is much more valuable than project revenue (e.g. a one-off consultancy engagement). A business with 80% recurring revenue gets a higher valuation multiple than one with 80% project revenue. PinpointAI's revenue analysis features help identify and present this split clearly."}
      },
      {id:"M3S2", title:"Revenue analysis features", type:"features", group:"revenue"}
    ]
  },
  {
    id:"M4", icon:"🏭", title:"Costs, Suppliers and Payroll Features", time:8,
    starters:[
      "What is a suppliers and costs analysis in FDD?",
      "Why would a buyer want to see a payroll or employee breakdown?",
      "What are fixed assets and why do they matter in a deal?",
      "What is inventory and when does it become relevant?"
    ],
    sections:[
      {id:"M4S1", title:"Understanding the cost base",
       content:"Understanding what a business spends money on - and whether those costs are well-managed, sustainable, and accurately reported - is a core part of FDD.\n\nCost analysis in FDD looks at:\n\n- Who are the main suppliers? What is the business paying them? Are there concentration risks (relying heavily on one supplier)?\n- What does the payroll look like? Are there any unusual payments, directors being paid above market, or vacancies that understate the true run-rate cost?\n- What physical assets does the business own (equipment, vehicles, machinery)? What condition are they in? Are they properly valued on the balance sheet?\n- Does the business hold stock (inventory)? Is it valued correctly? Is there any obsolete stock sitting on the books?\n\nAll of these can materially affect EBITDA (profitability) and the working capital calculation.",
       callout:{type:"green",label:"Run-rate costs",text:"'Run-rate' means the ongoing, normalised cost the business will carry forward. If the business had a one-off cost (e.g. a redundancy payment) that inflated costs last year, the run-rate strips that out. PinpointAI helps identify which costs are truly ongoing versus one-off, which feeds directly into the Quality of Earnings (QoE) analysis."}
      },

var done={};
var TOTAL_SECS = MODULES.reduce(function(a,m){return a+m.sections.length},0);
var currentMod=0, currentSec=0;
var chats={};

function allSecs(){
  var r=[];
  MODULES.forEach(function(m){m.sections.forEach(function(s){r.push({mod:m,sec:s})})});
  return r;
}

function flatIdx(mi,si){
  var n=0;
  for(var i=0;i<mi;i++) n+=MODULES[i].sections.length;
  return n+si;
}

function updateProgress(){
  var d=Object.keys(done).length;
  var pct=TOTAL_SECS>0?Math.round(d/TOTAL_SECS*100):0;
  var offset=75.4*(1-pct/100);
  var rng=document.getElementById("rng");
  if(rng) rng.style.strokeDashoffset=offset;
  var rngN=document.getElementById("rng-n");
  if(rngN) rngN.textContent=pct+"%";
  var pv=document.getElementById("prog-val");
  if(pv) pv.textContent=pct+"%";
  var sd=document.getElementById("sb-done");
  if(sd) sd.textContent=d;
  var totalMins=MODULES.reduce(function(a,m){return a+m.time},0);
  var doneRatio=TOTAL_SECS>0?d/TOTAL_SECS:0;
  var minsLeft=Math.round(totalMins*(1-doneRatio));
  var sl=document.getElementById("sb-left");
  if(sl) sl.textContent=minsLeft;
}

function buildSidebar(){
  var nav=document.getElementById("sb-nav");
  if(!nav) return;
  nav.innerHTML=MODULES.map(function(m,mi){
    var doneCount=m.sections.filter(function(s){return done[s.id]}).length;
    return "<div class=\"mod-item"+(mi===currentMod?" active":"")+"\" id=\"mi-"+mi+"\" onclick=\"goToMod("+mi+")\">"+
      "<div class=\"mi-icon\">"+m.icon+"</div>"+
      "<div class=\"mi-body\">"+
        "<div class=\"mi-title\">"+m.title+"</div>"+
        "<div class=\"mi-id\">"+doneCount+"/"+m.sections.length+" done</div>"+
      "</div>"+
      (doneCount===m.sections.length?"<div class=\"mi-done\">✓</div>":"")+
    "</div>"
  }).join("");
}

function goToMod(mi){
  currentMod=mi;
  currentSec=0;
  render();
}

function goTo(mi,si){
  currentMod=mi;
  currentSec=si;
  render();
}

function markDone(){
  var sec=MODULES[currentMod].sections[currentSec];
  done[sec.id]=true;
  var nextSi=currentSec+1;
  if(nextSi<MODULES[currentMod].sections.length){
    currentSec=nextSi;
  } else if(currentMod+1<MODULES.length){
    currentMod++;
    currentSec=0;
  }
  render();
}

function toggleSidebar(){
  document.getElementById("sb").classList.toggle("open");
}

function phaseCls(p){
  if(p==="p2") return "p2";
  if(p==="p3") return "p3";
  if(p==="p4") return "p4";
  if(p==="p5") return "p5";
  if(p==="p6") return "p6";
  return "tbc";
}

function phaseLabel(p){
  if(p==="p2") return "Phase 2";
  if(p==="p3") return "Phase 3";
  if(p==="p4") return "Phase 4";
  if(p==="p5") return "Phase 5";
  if(p==="p6") return "Phase 6";
  return "TBC";
}

function renderFeatures(group){
  var feats=FEATURES[group]||[];
  return "<div class=\"phase-legend\">"+
    "<div class=\"pl-item\"><div class=\"pl-dot p2\"></div>Phase 2 - Coming soon</div>"+
    "<div class=\"pl-item\"><div class=\"pl-dot p3\"></div>Phase 3</div>"+
    "<div class=\"pl-item\"><div class=\"pl-dot p4\"></div>Phase 4</div>"+
    "<div class=\"pl-item\"><div class=\"pl-dot p5\"></div>Phase 5</div>"+
    "<div class=\"pl-item\"><div class=\"pl-dot p6\"></div>Phase 6</div>"+
    "<div class=\"pl-item\"><div class=\"pl-dot tbc\"></div>TBC - Planned, timing not confirmed</div>"+
  "</div>"+
  "<div class=\"feature-grid\">"+
  feats.map(function(f){
    return "<div class=\"feature-card\">"+
      "<div class=\"fc-top\">"+
        "<div class=\"fc-icon\">"+f.icon+"</div>"+
        "<span class=\"fc-phase "+phaseCls(f.phase)+"\">"+phaseLabel(f.phase)+"</span>"+
      "</div>"+
      "<div class=\"fc-name\">"+f.name+"</div>"+
      "<div class=\"fc-what\">"+f.what.replace(/\n/g,"<br>")+"</div>"+
      "<div class=\"fc-divider\"></div>"+
      "<div class=\"fc-why-lbl\">Why it matters in a deal</div>"+
      "<div class=\"fc-why\">"+f.why+"</div>"+
      "<div class=\"fc-tags\">"+f.tags.map(function(t){return "<span class=\"fc-tag\">"+t+"</span>"}).join("")+"</div>"+
    "</div>"
  }).join("")+
  "</div>"
}

function renderCallout(c){
  if(!c) return "";
  return "<div class=\"callout "+c.type+"\"><div class=\"callout-label\">"+c.label+"</div><div class=\"callout-text\">"+c.text+"</div></div>"
}

function renderSection(mod, sec, mi, si){
  var isFirst=si===0;
  var isDone=!!done[sec.id];
  var totalSecs=mod.sections.length;
  var pct=Math.round((si/totalSecs)*100);
  var key=sec.id;
  if(!chats[key]) chats[key]=[{role:"assistant",content:"Hi - I'm Finn. Ask me anything about this feature area. Not sure where to start? Use one of the suggested questions below."}];

  var body="";

  if(sec.content){
    body+="<div class=\"sec-body\">"+sec.content.replace(/\n/g,"<br>")+"</div>";
  }
  if(sec.callout){
    body+=renderCallout(sec.callout);
  }
  if(sec.type==="features" && sec.group){
    body+=renderFeatures(sec.group);
  }

  // FINN CHAT
  var starterBtns=mod.starters.map(function(q){
    return "<button class=\"finn-q\" onclick=\"askFinn(this,'"+key+"')\">"+q+"</button>"
  }).join("");

  var msgs=chats[key].map(function(m){
    return "<div class=\"finn-msg "+m.role+"\">"+m.content+"</div>"
  }).join("");

  body+="<div class=\"finn-wrap\">"+
    "<div class=\"finn-hdr\">"+
      "<div class=\"finn-avatar\">🎓</div>"+
      "<div><div class=\"finn-name\">Ask Finn</div><div class=\"finn-role\">Platform & FDD Specialist</div></div>"+
      "<div class=\"finn-badge\">AI TUTOR</div>"+
    "</div>"+
    "<div class=\"finn-msgs\" id=\"msgs-"+key+"\">"+msgs+"</div>"+
    "<div class=\"finn-starters\">"+
      "<div class=\"finn-starter-lbl\">Suggested questions</div>"+
      starterBtns+
    "</div>"+
    "<div class=\"finn-input-row\">"+
      "<input class=\"finn-input\" id=\"inp-"+key+"\" placeholder=\"Ask Finn anything about this feature...\" onkeydown=\"if(event.key==='Enter')sendFinn('"+key+"')\"/>"+
      "<button class=\"finn-send\" onclick=\"sendFinn('"+key+"')\"><svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round'><line x1='22' y1='2' x2='11' y2='13'/><polygon points='22 2 15 22 11 13 2 9 22 2'/></svg></button>"+
    "</div>"+
  "</div>";

  var prevBtn="";
  if(si>0){
    prevBtn="<button class=\"nf-btn nf-prev\" onclick=\"goTo("+mi+","+(si-1)+")\">"+
      "<svg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round'><polyline points='15 18 9 12 15 6'/></svg> Previous</button>";
  } else if(mi>0){
    var pm=MODULES[mi-1];
    prevBtn="<button class=\"nf-btn nf-prev\" onclick=\"goTo("+(mi-1)+","+(pm.sections.length-1)+")\">"+
      "<svg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round'><polyline points='15 18 9 12 15 6'/></svg> Previous</button>";
  }

  var nextCls=isDone?"nf-next":"nf-done";
  var nextLabel=isDone?"Next section":"Mark done and continue";
  var nextBtn="<button class=\"nf-btn "+nextCls+"\" onclick=\"markDone()\">"+nextLabel+
    "<svg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' style='margin-left:6px'><polyline points='9 18 15 12 9 6'/></svg></button>";

  return "<div class=\"sec-progress\"><div class=\"sec-progress-fill\" style=\"width:"+pct+"%\"></div></div>"+
    "<div class=\"ch\">"+
      "<div class=\"ch-eyebrow\">"+mod.id+" - "+mod.title+"</div>"+
      "<div class=\"ch-title\">"+sec.title+"</div>"+
      "<div class=\"ch-meta\">"+
        "<div class=\"ch-meta-item\"><span>⏱</span> "+mod.time+" min</div>"+
        "<div class=\"ch-meta-item\"><span>📍</span> Section "+(si+1)+" of "+totalSecs+"</div>"+
        (isDone?"<div class=\"ch-meta-item\" style=\"color:var(--green)\"><span>✓</span> Completed</div>":"")+
      "</div>"+
    "</div>"+
    body+
    "<div class=\"nav-footer\">"+prevBtn+nextBtn+"</div>"
}

function render(){
  var mod=MODULES[currentMod];
  var sec=mod.sections[currentSec];
  var ct=document.getElementById("cti");
  if(ct){
    ct.innerHTML=renderSection(mod,sec,currentMod,currentSec);
    ct.style.animation="none";
    setTimeout(function(){ct.style.animation="fadeUp .25s ease-out"},10);
    document.getElementById("ct").scrollTop=0;
  }
  buildSidebar();
  updateProgress();
}

function askFinn(btn,key){
  var q=btn.textContent;
  sendFinnMsg(key,q);
}

function sendFinn(key){
  var inp=document.getElementById("inp-"+key);
  if(!inp||!inp.value.trim()) return;
  var q=inp.value.trim();
  inp.value="";
  sendFinnMsg(key,q);
}

function sendFinnMsg(key,q){
  if(!chats[key]) chats[key]=[];
  chats[key].push({role:"user",content:q});
  appendMsg(key,"user",q);
  appendMsg(key,"thinking","Finn is thinking...");
  var mod=MODULES[currentMod];
  var sec=mod.sections[currentSec];
  var context="Current module: "+mod.title+". Current section: "+sec.title+". Feature group: "+(sec.group||"general")+".";
  var msgs=chats[key].filter(function(m){return m.role!=="assistant"||m.content!=="Finn is thinking..."});
  fetch("/.netlify/functions/claude",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({system:FINN_SYS+"\n\nContext: "+context,messages:msgs})
  }).then(function(r){return r.json()}).then(function(d){
    var reply="";
    if(d&&d.content&&d.content[0]&&d.content[0].text) reply=d.content[0].text;
    else if(d&&d.error) reply="Finn is not available right now - please try again in a moment.";
    else reply="Finn is not available right now.";
    removeThinking(key);
    chats[key].push({role:"assistant",content:reply});
    appendMsg(key,"finn",reply);
  }).catch(function(){
    removeThinking(key);
    appendMsg(key,"finn","Connection issue - please try again.");
  });
}

function appendMsg(key,role,text){
  var el=document.getElementById("msgs-"+key);
  if(!el) return;
  var div=document.createElement("div");
  div.className="finn-msg "+(role==="user"?"user":role==="thinking"?"finn thinking":"finn");
  div.textContent=text;
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
}

function removeThinking(key){
  var el=document.getElementById("msgs-"+key);
  if(!el) return;
  var th=el.querySelector(".thinking");
  if(th) th.remove();
}

window.onload=function(){render();};
</script>
</body>
</html>
