<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICP & Buyer Personas — PinpointAI Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#211847;--dark:#0F0D2A;--royal:#3D50F4;--royal2:#2E3FD0;
  --cyan:#35FFE9;--red:#FA295F;--white:#FFFFFF;--midgray:#7E8587;
  --bg:#EEF0F8;--surface:#FFF;--card:#F5F6FC;--border:#E0E3F0;
  --text:#1A1835;--text2:#3A3D5C;--muted:#7E8587;--faint:#CDD0E8;
  --green:#0A7A4A;--green-bg:rgba(10,122,74,.08);--green-bdr:rgba(10,122,74,.22);
  --amber:#8A5500;--amber-bg:rgba(200,130,0,.08);--amber-bdr:rgba(200,130,0,.25);
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono','Courier New',monospace;
  --r:8px;--rl:12px;--rxl:16px;
  --sh:0 1px 3px rgba(33,24,71,.07);--shm:0 4px 16px rgba(33,24,71,.1);
  --sidebar-w:272px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(33,24,71,.15);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes dot{0%,80%,100%{opacity:.2;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}
.fu{animation:fadeUp .22s ease-out}

#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* TOPBAR */
#tb{height:56px;display:flex;align-items:center;padding:0 18px;background:var(--navy);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;gap:0;z-index:200}
.tb-logo{display:flex;align-items:center;gap:8px;padding-right:18px;border-right:1px solid rgba(255,255,255,.1);text-decoration:none;flex-shrink:0}
.tb-logo-box{width:28px;height:28px;background:var(--royal);border-radius:7px;display:flex;align-items:center;justify-content:center}
.tb-logo-box svg{width:15px;height:15px}
.tb-logo-name{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.3px}
.tb-logo-name b{color:var(--cyan);font-weight:700}
.tb-mid{flex:1;display:flex;align-items:center;padding:0 18px;gap:14px;min-width:0;overflow:hidden}
.tb-course{font-size:9px;font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);white-space:nowrap}
.tb-sep{width:1px;height:16px;background:rgba(255,255,255,.1);flex-shrink:0}
.tb-sec{font-size:12px;color:rgba(255,255,255,.7);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-right{display:flex;align-items:center;gap:14px;flex-shrink:0}
.tb-back{display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);color:rgba(255,255,255,.4);text-decoration:none;letter-spacing:.5px;transition:color .15s;padding:6px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.08)}
.tb-back:hover{color:rgba(255,255,255,.8);border-color:rgba(255,255,255,.2)}
.tb-prog-val{font-size:11px;font-family:var(--mono);color:rgba(255,255,255,.5);font-weight:600}
.tb-ring{position:relative;width:32px;height:32px;flex-shrink:0}
.tb-ring svg{transform:rotate(-90deg)}
.tb-ring-n{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-family:var(--mono);color:var(--cyan);font-weight:600}
.tb-menu-btn{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;padding:6px;border-radius:6px;display:flex;align-items:center;transition:all .15s}
.tb-menu-btn:hover{background:rgba(255,255,255,.08);color:#fff}

#main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sb{width:var(--sidebar-w);flex-shrink:0;background:var(--dark);border-right:1px solid rgba(255,255,255,.05);overflow-y:auto;display:flex;flex-direction:column;transition:width .2s}
#sb.closed{width:0;overflow:hidden}
.sb-top{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.06);background:linear-gradient(135deg,rgba(61,80,244,.18) 0%,rgba(53,255,233,.04) 100%)}
.sb-top-lbl{font-size:9px;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:12px}
.sb-cards{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.sb-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);padding:10px 12px}
.sb-card-n{font-size:22px;font-weight:700;font-family:var(--mono);color:#fff;line-height:1}
.sb-card-n.c{color:var(--cyan)}
.sb-card-l{font-size:10px;color:rgba(255,255,255,.4);margin-top:3px}
.sb-mods{padding:6px 0 20px}
.sb-grp{padding:12px 16px 4px;font-size:9px;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3)}
.mi{cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.mi:hover{background:rgba(255,255,255,.04)}
.mi.on{background:rgba(61,80,244,.16);border-left-color:var(--royal)}
.mi-hdr{display:flex;align-items:center;gap:9px;padding:8px 14px}
.mi-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:rgba(255,255,255,.06)}
.mi.on .mi-ico{background:rgba(61,80,244,.28)}
.mi-info{flex:1;min-width:0}
.mi-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.mi.on .mi-name{color:#fff}
.mi-meta{display:flex;align-items:center;gap:5px;margin-top:2px}
.mi-id{font-size:9px;font-family:var(--mono);color:rgba(255,255,255,.3)}
.mi.on .mi-id{color:rgba(61,80,244,.75)}
.mi-t{font-size:9px;font-family:var(--mono);color:rgba(255,255,255,.25)}
.mi-ck{width:15px;height:15px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:7px;flex-shrink:0}
.mi-ck.ok{background:rgba(53,255,233,.14);border-color:var(--cyan);color:var(--cyan)}
.si-list{padding:1px 0 6px}
.si{display:flex;align-items:center;gap:7px;padding:5px 14px 5px 48px;cursor:pointer;transition:background .12s}
.si:hover{background:rgba(255,255,255,.04)}
.si.on{background:rgba(61,80,244,.1)}
.si-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:5px;transition:all .15s}
.si-dot.ok{border-color:var(--cyan);background:rgba(53,255,233,.18);color:var(--cyan)}
.si-dot.cur{border-color:var(--royal);background:rgba(61,80,244,.28)}
.si-lbl{font-size:11px;color:rgba(255,255,255,.45);line-height:1.35}
.si.on .si-lbl{color:rgba(255,255,255,.85)}
.si.done .si-lbl{color:rgba(53,255,233,.55)}

/* CONTENT */
#ct{flex:1;overflow-y:auto;background:var(--bg)}
#cti{max-width:720px;margin:0 auto;padding:36px 44px 90px}

/* LESSON HEADER */
.lhdr{background:var(--surface);border:1px solid var(--border);border-radius:var(--rxl);padding:24px 28px;margin-bottom:26px;box-shadow:var(--sh)}
.lcrumb{display:flex;align-items:center;gap:8px;margin-bottom:11px;flex-wrap:wrap}
.lcrumb-ico{width:20px;height:20px;border-radius:5px;background:rgba(61,80,244,.1);display:flex;align-items:center;justify-content:center;font-size:10px}
.lcrumb-chev{color:var(--muted);font-size:11px}
.badge{font-size:9px;font-family:var(--mono);padding:3px 8px;border-radius:20px;letter-spacing:.4px;font-weight:600;border:1px solid}
.badge-key{background:rgba(250,41,95,.08);color:#C8144A;border-color:rgba(200,20,74,.22)}
.ltitle{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px;line-height:1.25;margin-bottom:10px}
.lmeta{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.lmi{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);font-family:var(--mono)}
.lmi svg{width:12px;height:12px;opacity:.55}
.lpbar{height:3px;background:var(--border);border-radius:2px;margin-top:12px;overflow:hidden}
.lpfill{height:100%;background:linear-gradient(90deg,var(--royal),var(--cyan));border-radius:2px;transition:width .4s}

/* BODY */
.btext p{font-size:15px;line-height:1.82;color:var(--text2);margin-bottom:15px}

/* CALLOUTS */
.co{padding:14px 18px;border-radius:var(--rl);margin:18px 0;font-size:14px;line-height:1.7;border:1px solid}
.co-blue{background:rgba(61,80,244,.06);border-color:rgba(61,80,244,.2);color:#1A2880}
.co-green{background:var(--green-bg);border-color:var(--green-bdr);color:var(--green)}
.co-amber{background:var(--amber-bg);border-color:var(--amber-bdr);color:var(--amber)}
.co-red{background:rgba(200,20,74,.07);border-color:rgba(200,20,74,.22);color:#8A1A1A}
.co-lbl{font-size:9px;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;opacity:.65;font-weight:700}

/* PERSONA CARDS */
.persona-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}
.persona-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;box-shadow:var(--sh);transition:all .15s;cursor:pointer}
.persona-card:hover{border-color:rgba(61,80,244,.3);box-shadow:0 4px 20px rgba(61,80,244,.1);transform:translateY(-1px)}
.persona-card.primary{border-color:rgba(61,80,244,.25);background:rgba(61,80,244,.03)}
.persona-card.secondary{border-color:rgba(53,255,233,.15);background:rgba(53,255,233,.02)}
.persona-card.tertiary{border-color:rgba(255,255,255,.15);background:var(--card)}
.pc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pc-title{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.pc-badge{font-size:9px;font-family:var(--mono);padding:3px 8px;border-radius:20px;letter-spacing:.5px;font-weight:600;border:1px solid}
.pcb-primary{background:rgba(61,80,244,.1);color:var(--royal);border-color:rgba(61,80,244,.25)}
.pcb-secondary{background:rgba(53,255,233,.1);color:#0A7A6A;border-color:rgba(53,255,233,.3)}
.pcb-tertiary{background:var(--card);color:var(--muted);border-color:var(--border)}
.pc-role{font-size:11px;font-family:var(--mono);color:var(--muted);margin-bottom:10px;letter-spacing:.3px}
.pc-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.pc-tags{display:flex;flex-wrap:wrap;gap:5px}
.pc-tag{font-size:10px;font-family:var(--mono);background:var(--card);border:1px solid var(--border);color:var(--muted);padding:2px 8px;border-radius:10px}

/* SENIORITY TABLE */
.sen-table{margin:20px 0;border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh)}
.sen-hdr{display:grid;grid-template-columns:2fr 2fr 3fr 2fr;gap:0;background:var(--navy);padding:10px 16px}
.sen-hdr-cell{font-size:10px;font-family:var(--mono);color:rgba(255,255,255,.5);letter-spacing:1px;text-transform:uppercase;font-weight:600}
.sen-row{display:grid;grid-template-columns:2fr 2fr 3fr 2fr;gap:0;padding:12px 16px;border-top:1px solid var(--border);transition:background .12s}
.sen-row:hover{background:rgba(61,80,244,.03)}
.sen-row.tier1{background:rgba(61,80,244,.04)}
.sen-row.tier2{background:rgba(53,255,233,.03)}
.sen-cell{font-size:12px;color:var(--text2);padding-right:12px;line-height:1.4}
.sen-cell strong{color:var(--text);font-weight:600;display:block;margin-bottom:2px}
.sen-cell.alt{font-size:11px;color:var(--muted);font-family:var(--mono)}
.tier-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-family:var(--mono);padding:3px 8px;border-radius:10px;font-weight:600;letter-spacing:.5px}
.tb1{background:rgba(61,80,244,.1);color:var(--royal);border:1px solid rgba(61,80,244,.2)}
.tb2{background:rgba(53,255,233,.08);color:#0A7A6A;border:1px solid rgba(53,255,233,.2)}
.tb3{background:var(--card);color:var(--muted);border:1px solid var(--border)}

/* FIRM TYPE CARDS */
.firm-grid{display:grid;grid-template-columns:1fr;gap:12px;margin:20px 0}
.firm-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;box-shadow:var(--sh)}
.firm-card-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.firm-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.firm-card-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.firm-card-sub{font-size:11px;font-family:var(--mono);color:var(--muted);margin-top:2px}
.firm-desc{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:14px}
.firm-examples{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.firm-ex{font-size:11px;font-family:var(--mono);background:var(--card);border:1px solid var(--border);color:var(--text2);padding:3px 10px;border-radius:6px;font-weight:500}
.firm-why{background:rgba(61,80,244,.05);border:1px solid rgba(61,80,244,.15);border-radius:var(--r);padding:10px 14px;font-size:12px;color:#1A2880;line-height:1.55}
.firm-why-lbl{font-size:9px;font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;color:rgba(61,80,244,.6);margin-bottom:4px;font-weight:700}

/* APPROACH CARDS */
.approach-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:20px 0}
.ap-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;box-shadow:var(--sh)}
.ap-level{font-size:9px;font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;font-weight:700}
.ap-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;letter-spacing:-.2px}
.ap-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.ap-do{font-size:11px;color:var(--green);font-family:var(--mono);margin-bottom:3px}
.ap-dont{font-size:11px;color:#8A1A1A;font-family:var(--mono);margin-bottom:3px}

/* PROSE */
.prose{background:var(--dark);border:1px solid rgba(255,255,255,.07);border-radius:var(--rl);padding:20px 24px;margin:20px 0;font-size:13px;line-height:1.9;color:rgba(255,255,255,.65);white-space:pre-wrap;font-family:var(--mono)}

/* FINN */
.fw{margin-top:32px;border-radius:var(--rxl);overflow:hidden;border:1px solid var(--border);background:var(--surface);box-shadow:var(--shm)}
.fh{height:52px;display:flex;align-items:center;gap:12px;padding:0 18px;background:var(--navy)}
.fav-wrap{position:relative}
.fav{width:32px;height:32px;border-radius:8px;background:var(--royal);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.fon{position:absolute;bottom:-1px;right:-1px;width:9px;height:9px;border-radius:50%;background:var(--cyan);border:2px solid var(--navy)}
.finfo{flex:1}
.fname{font-size:13px;color:#fff;font-weight:700}
.fsub{font-size:9px;color:rgba(255,255,255,.4);font-family:var(--mono);margin-top:1px}
.fai{font-size:9px;font-family:var(--mono);background:rgba(53,255,233,.12);color:var(--cyan);border:1px solid rgba(53,255,233,.22);padding:3px 8px;border-radius:20px;letter-spacing:.5px;font-weight:600}
.fmsgs{max-height:380px;overflow-y:auto;padding:16px 18px;display:none;background:var(--card)}
.fmsgs.vis{display:block}
.mr{display:flex;gap:9px;margin-bottom:13px}
.mr.u{justify-content:flex-end}
.mav{width:24px;height:24px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-family:var(--mono);margin-top:1px;font-weight:700}
.mav.f{background:var(--royal);color:#fff}
.mav.y{background:var(--navy);color:rgba(255,255,255,.6)}
.mb{max-width:80%;padding:10px 14px;font-size:14px;line-height:1.75;white-space:pre-wrap;word-break:break-word;border-radius:var(--r)}
.mb.f{background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:2px var(--r) var(--r) var(--r)}
.mb.u{background:var(--navy);color:rgba(255,255,255,.82);border-radius:var(--r) 2px var(--r) var(--r)}
.tdots{display:flex;gap:5px;padding:3px 0;align-items:center}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--royal);animation:dot 1.2s infinite}
.fst{padding:13px 18px;background:var(--card);border-bottom:1px solid var(--border)}
.fst-lbl{font-size:9px;font-family:var(--mono);color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:9px;font-weight:700}
.fst-g{display:flex;flex-wrap:wrap;gap:6px}
.fsbtn{background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .15s;font-family:var(--font)}
.fsbtn:hover{background:rgba(61,80,244,.06);border-color:rgba(61,80,244,.3);color:var(--royal)}
.fin{display:flex;gap:8px;padding:11px 14px;border-top:1px solid var(--border)}
.fta{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:9px 13px;font-size:14px;font-family:var(--font);color:var(--text);resize:none;max-height:100px;line-height:1.5;transition:border-color .15s}
.fta:focus{outline:none;border-color:var(--royal);background:var(--surface)}
.fta::placeholder{color:var(--muted)}
.fsnd{width:38px;height:38px;border-radius:var(--r);border:none;background:var(--royal);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:flex-end;transition:all .15s}
.fsnd:hover{background:var(--royal2);transform:scale(1.04)}
.fsnd:disabled{background:var(--faint);cursor:default;transform:none}

/* NAV */
.lnav{margin-top:40px;padding-top:22px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.nbk{display:flex;align-items:center;gap:7px;padding:10px 18px;border-radius:var(--r);border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-family:var(--mono);font-weight:600;transition:all .15s}
.nbk:hover:not(:disabled){background:var(--card);color:var(--text)}
.nbk:disabled{color:var(--faint);border-color:var(--faint);cursor:default}
.nnx{display:flex;align-items:center;gap:8px;padding:11px 22px;border-radius:var(--r);border:none;background:var(--royal);color:#fff;cursor:pointer;font-size:12px;font-family:var(--mono);font-weight:700;letter-spacing:.3px;transition:all .15s;box-shadow:0 2px 12px rgba(61,80,244,.3)}
.nnx:hover{background:var(--royal2);box-shadow:0 4px 20px rgba(61,80,244,.4);transform:translateY(-1px)}
.nnx.done{background:var(--green);box-shadow:0 2px 12px rgba(10,122,74,.25)}

@media(max-width:700px){
  #cti{padding:20px 16px 80px}
  #sb{position:fixed;top:0;left:0;height:100vh;z-index:300}
  #sb.closed{width:0}
  .tb-sec{display:none}
  .persona-grid{grid-template-columns:1fr}
  .approach-grid{grid-template-columns:1fr}
  .sen-hdr,.sen-row{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="app">

        '<div class="pc-desc">'+p.desc+'</div>'+
        '<div class="pc-tags">'+p.tags.map(function(t){return '<div class="pc-tag">'+t+'</div>'}).join('')+'</div>'+
        '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:12px;color:var(--royal)"><strong>Approach:</strong> '+p.approach+'</div>'+
      '</div>'
    }).join('')+
  '</div>'
}

function renderApproach(){
  var levels = [
    {level:"PARTNER / MD",color:"var(--royal)",title:"Business outcomes only",desc:"They care about firm reputation, client relationships, and P&L. Never pitch features. Lead with competitive positioning and risk reduction.",dos:["Talk about mandate volume and win rates","Reference what peer firms are doing","Keep it under 10 minutes"],donts:["Never demo the product","Never talk about Excel speed","Never ask about their process"]},
    {level:"DIRECTOR / VP",color:"#0A7A4A",title:"Capacity and margin",desc:"They want to know how this affects their team's ability to take on more work and deliver better margins. Connect product to commercial outcome.",dos:["Frame around hours saved per engagement","Ask about peak period capacity constraints","Connect to their revenue targets"],donts:["Don't skip to pricing","Don't oversell the AI angle","Don't ignore their seniority"]},
    {level:"MANAGER / SM",color:"var(--amber)",title:"Workflow and time",desc:"This is your primary conversation. Be specific. Talk about EBITDA bridges, data room analysis, normalisation. Show you understand their exact workflow.",dos:["Ask how long specific tasks take","Demo on a real-looking dataset","Get them to describe their pain in their own words"],donts:["Don't generalise","Don't skip the demo","Don't rush to commercial"]}
  ];
  return '<div class="approach-grid">'+levels.map(function(l){
    return '<div class="ap-card">'+
      '<div class="ap-level" style="color:'+l.color+'">'+l.level+'</div>'+
      '<div class="ap-title">'+l.title+'</div>'+
      '<div class="ap-desc">'+l.desc+'</div>'+
      l.dos.map(function(d){return '<div class="ap-do">&#10003; '+d+'</div>'}).join('')+
      l.donts.map(function(d){return '<div class="ap-dont">&#10007; '+d+'</div>'}).join('')+
    '</div>'
  }).join('')+'</div>'
}

function renderObjections(){
  return '<div style="display:flex;flex-direction:column;gap:12px;margin:20px 0">'+
    OBJECTIONS.map(function(o){
      return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;box-shadow:var(--sh)">'+
        '<div style="font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-weight:600">'+o.persona+'</div>'+
        '<div style="font-size:14px;color:var(--text);font-weight:600;margin-bottom:8px">"'+o.objection+'"</div>'+
        '<div style="font-size:13px;color:var(--green);line-height:1.6"><strong>Response:</strong> '+o.response+'</div>'+
      '</div>'
    }).join('')+'</div>'
}

function renderJourney(){
  return '<div style="display:flex;flex-direction:column;gap:0;margin:20px 0">'+
    JOURNEY.map(function(j,i){
      return '<div style="display:flex;gap:16px;padding:14px 0;'+(i<JOURNEY.length-1?'border-bottom:1px solid var(--border)':'')+'">'+
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--royal);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px">'+j.step+'</div>'+
        '<div>'+
          '<div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px">'+j.title+'</div>'+
          '<div style="font-size:11px;font-family:var(--mono);color:var(--royal);margin-bottom:4px">'+j.who+'</div>'+
          '<div style="font-size:13px;color:var(--text2)">'+j.desc+'</div>'+
        '</div>'+
      '</div>'
    }).join('')+'</div>'
}

function renderContent(sec){
  var html = '<div class="btext">'+sec.content.split('\\n\\n').map(function(p){return '<p>'+p+'</p>'}).join('')+'</div>';
  if(sec.type==='firms') html += '<div class="firm-grid">'+renderFirms()+'</div>';
  if(sec.type==='seniority') html += renderSeniority();
  if(sec.type==='personas') html += renderPersonas();
  if(sec.type==='approach') html += renderApproach();
  if(sec.type==='objections') html += renderObjections();
  if(sec.type==='journey') html += renderJourney();
  if(sec.callout) html += renderCO(sec.callout);
  if(sec.callout2) html += renderCO(sec.callout2);
  return html;
}

async function finnSend(q){
  var key=cK();
  if(!chats[key]) chats[key]=[];
  chats[key].push({role:'user',content:q});
  var msgs=document.getElementById('fmsgs');
  if(msgs){msgs.classList.add('vis');finnRender(key);}
  var st=document.getElementById('fst');if(st)st.style.display='none';
  var ld=document.createElement('div');ld.id='fld';ld.className='mr fu';
  ld.innerHTML='<div class="mav f">F</div><div class="mb f"><div class="tdots"><div class="tdot" style="animation-delay:0s"></div><div class="tdot" style="animation-delay:.2s"></div><div class="tdot" style="animation-delay:.4s"></div></div></div>';
  if(msgs){msgs.appendChild(ld);msgs.scrollTop=msgs.scrollHeight;}
  var mod=MODULES[aM],sec=mod.sections[aS];
  try{
    var res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,
        system:FINN_SYS+'\\n\\nCurrent module: '+mod.title+'. Current section: '+sec.title+'.',
        messages:chats[key]})});
    var data=await res.json();
    var reply=(data.content&&data.content.find(function(b){return b.type==='text'}))||{text:'Something went wrong.'};
    chats[key].push({role:'assistant',content:reply.text});
  }catch(e){chats[key].push({role:'assistant',content:'Network error - please try again.'});}
  var ld2=document.getElementById('fld');if(ld2)ld2.remove();
  finnRender(key);
}

function finnRender(key){
  var div=document.getElementById('fmsgs');if(!div)return;
  div.innerHTML=(chats[key]||[]).map(function(m){
    return '<div class="mr '+(m.role==='user'?'u':'')+' fu">'+
      (m.role==='assistant'?'<div class="mav f">F</div>':'')+
      '<div class="mb '+(m.role==='assistant'?'f':'u')+'">'+m.content.replace(/\n/g,'<br>')+'</div>'+
      (m.role==='user'?'<div class="mav y">M</div>':'')+
    '</div>'
  }).join('');
  div.scrollTop=div.scrollHeight;
}
function finnKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();finnSubmit();}var ta=document.getElementById('fta');if(ta){ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,100)+'px';}}
function finnSubmit(){var ta=document.getElementById('fta');var q=ta?ta.value.trim():'';if(!q)return;ta.value='';ta.style.height='auto';finnSend(q);}

function totSec(){return MODULES.reduce(function(a,m){return a+m.sections.length},0)}
function doneSec(){return Object.keys(done).filter(function(k){return done[k]}).length}

function markDone(){
  done[aM+'-'+aS]=true;
  var mod=MODULES[aM];
  if(aS<mod.sections.length-1) aS++;
  else if(aM<MODULES.length-1){aM++;aS=0;}
  render();document.getElementById('ct').scrollTop=0;
}
function goBack(){if(aS>0)aS--;else if(aM>0){aM--;aS=MODULES[aM].sections.length-1;}render();document.getElementById('ct').scrollTop=0;}
function goTo(mi,si){aM=mi;aS=si;render();document.getElementById('ct').scrollTop=0;if(window.innerWidth<700)toggleSidebar();}
function toggleSidebar(){sbOpen=!sbOpen;document.getElementById('sb').classList.toggle('closed',!sbOpen);}

function render(){
  var mod=MODULES[aM],sec=mod.sections[aS];
  var key=aM+'-'+aS;
  var isDone=!!done[key];
  var isFirst=aM===0&&aS===0;
  var isLast=aM===MODULES.length-1&&aS===mod.sections.length-1;
  var ts=totSec(),ds=doneSec();
  var pct=Math.round(ds/ts*100);
  var rem=MODULES.slice(aM+1).reduce(function(a,m){return a+m.time},0)+Math.round(((mod.sections.length-aS)/mod.sections.length)*mod.time);

  document.getElementById('tb-sec').textContent=mod.icon+' '+mod.title+' - '+sec.title;
  document.getElementById('pg-lbl').textContent=ds+' / '+ts;
  document.getElementById('rng-n').textContent=pct+'%';
  document.getElementById('rng').style.strokeDashoffset=75.4-(75.4*pct/100);
  document.getElementById('sb-done').textContent=ds;
  document.getElementById('sb-left').textContent=rem;

  document.getElementById('sb-nav').innerHTML=MODULES.map(function(m,mi){
    var mA=mi===aM,mD=m.sections.every(function(_,si){return done[mi+'-'+si]});
    var secs=mA?'<div class="si-list">'+m.sections.map(function(s,si){
      var sA=si===aS,sD=done[mi+'-'+si];
      return '<div class="si'+(sA?' on':'')+(sD?' done':'')+'" onclick="event.stopPropagation();goTo('+mi+','+si+')">'+
        '<div class="si-dot'+(sD?' ok':sA?' cur':'')+'">'+((sD)?'&#10003;':'')+'</div>'+
        '<span class="si-lbl">'+s.title+'</span></div>'
    }).join('')+'</div>':'';
    return '<div class="mi'+(mA?' on':'')+'" onclick="goTo('+mi+',0)">'+
      '<div class="mi-hdr">'+
        '<div class="mi-ico">'+m.icon+'</div>'+
        '<div class="mi-info"><div class="mi-name">'+m.title+'</div><div class="mi-meta"><span class="mi-id">'+m.id+'</span><span class="mi-t">~'+m.time+'m</span></div></div>'+
        '<div class="mi-ck'+(mD?' ok':'')+'">'+((mD)?'&#10003;':'')+'</div>'+
      '</div>'+secs+'</div>'
  }).join('');

  var secPct=Math.round((aS+1)/mod.sections.length*100);
  var hasHist=chats[key]&&chats[key].length>0;

  document.getElementById('cti').innerHTML=
    '<div class="lhdr">'+
      '<div class="lcrumb">'+
        '<div class="lcrumb-ico">'+mod.icon+'</div>'+
        '<span style="color:var(--royal);font-weight:600;font-family:var(--mono);font-size:11px">'+mod.id+' - '+mod.title+'</span>'+
        '<span style="color:var(--muted)">&#8250;</span>'+
        '<span style="font-size:11px;font-family:var(--mono);color:var(--muted)">Section '+(aS+1)+' of '+mod.sections.length+'</span>'+
      '</div>'+
      '<div class="ltitle">'+sec.title+'</div>'+
      '<div class="lmeta">'+
        '<div class="lmi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>~'+mod.time+' min</div>'+
        (isDone?'<div class="lmi" style="color:var(--green)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Completed</div>':'')+
      '</div>'+
      '<div class="lpbar"><div class="lpfill" style="width:'+secPct+'%"></div></div>'+
    '</div>'+
    renderContent(sec)+
    '<div class="fw">'+
      '<div class="fh">'+
        '<div class="fav-wrap"><div class="fav">&#127891;</div><div class="fon"></div></div>'+
        '<div class="finfo"><div class="fname">Ask Finn</div><div class="fsub">ICP Trainer - PinpointAI</div></div>'+
        '<div class="fai">AI TRAINER</div>'+
      '</div>'+
      '<div id="fmsgs" class="fmsgs'+(hasHist?' vis':'')+'"></div>'+
      (!hasHist?'<div id="fst" class="fst"><div class="fst-lbl">Questions for this section</div><div class="fst-g">'+
        mod.starters.map(function(q){return '<button class="fsbtn" onclick="finnSend(this.textContent)">'+q+'</button>'}).join('')+
      '</div></div>':'')+
      '<div class="fin">'+
        '<textarea id="fta" class="fta" placeholder="Ask Finn anything..." rows="1" onkeydown="finnKey(event)"></textarea>'+
        '<button class="fsnd" onclick="finnSubmit()"><svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>'+
      '</div>'+
    '</div>'+
    '<div class="lnav">'+
      '<button class="nbk" onclick="goBack()"'+(isFirst?' disabled':'')+'>'+
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg> Back'+
      '</button>'+
      '<button class="nnx'+(isDone?' done':'')+'" onclick="markDone()">'+
        (isDone?'Done - Next':'Mark done')+
        ' <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>'+
      '</button>'+
    '</div>';

  if(hasHist){finnRender(key);document.getElementById('fmsgs').classList.add('vis');}
}

render();
</script>
</body>
</html>
