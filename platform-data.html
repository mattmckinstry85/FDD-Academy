<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platform Data Requirements - PinpointAI Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#211847;--dark:#0F0D2A;--royal:#3D50F4;--royal2:#2E3FD0;
  --cyan:#35FFE9;--red:#FA295F;--white:#FFFFFF;--midgray:#7E8587;
  --bg:#EEF0F8;--surface:#FFF;--card:#F5F6FC;--border:#E0E3F0;
  --text:#1A1835;--text2:#3A3D5C;--muted:#7E8587;--faint:#CDD0E8;
  --green:#0A7A4A;--green-bg:rgba(10,122,74,.08);--green-bdr:rgba(10,122,74,.22);
  --amber:#8A5500;--amber-bg:rgba(200,130,0,.08);--amber-bdr:rgba(200,130,0,.25);
  --font:'Rubik',system-ui,sans-serif;--mono:'JetBrains Mono','Courier New',monospace;
  --r:8px;--rl:12px;--rxl:16px;
  --sh:0 1px 3px rgba(33,24,71,.07);--shm:0 4px 16px rgba(33,24,71,.1);
  --sidebar-w:272px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-weight:300;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(33,24,71,.15);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes dot{0%,80%,100%{opacity:.2;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}
.fu{animation:fadeUp .22s ease-out}

#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* TOPBAR */
#tb{height:56px;display:flex;align-items:center;padding:0 18px;background:var(--navy);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;gap:0;z-index:200}
.tb-logo{display:flex;align-items:center;gap:8px;padding-right:18px;border-right:1px solid rgba(255,255,255,.1);text-decoration:none;flex-shrink:0}
.tb-logo-box{width:28px;height:28px;background:var(--royal);border-radius:7px;display:flex;align-items:center;justify-content:center}
.tb-logo-box svg{width:15px;height:15px}
.tb-logo-name{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.3px}
.tb-logo-name b{color:var(--cyan);font-weight:700}
.tb-mid{flex:1;display:flex;align-items:center;padding:0 18px;gap:14px;min-width:0;overflow:hidden}
.tb-course{font-size:9px;font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);white-space:nowrap}
.tb-sep{width:1px;height:16px;background:rgba(255,255,255,.1);flex-shrink:0}
.tb-sec{font-size:12px;color:rgba(255,255,255,.7);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-right{display:flex;align-items:center;gap:14px;flex-shrink:0}
.tb-back{display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);color:var(--dark);text-decoration:none;letter-spacing:.5px;transition:all .15s;padding:6px 14px;border-radius:6px;border:none;background:#35FFE9;font-weight:700}
.tb-back:hover{background:#20EDD6;transform:translateY(-1px)}
.tb-prog-val{font-size:11px;font-family:var(--mono);color:rgba(255,255,255,.5);font-weight:600}
.tb-ring{position:relative;width:32px;height:32px;flex-shrink:0}
.tb-ring svg{transform:rotate(-90deg)}
.tb-ring-n{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-family:var(--mono);color:var(--cyan);font-weight:600}
.tb-menu-btn{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;padding:6px;border-radius:6px;display:flex;align-items:center;transition:all .15s}
.tb-menu-btn:hover{background:rgba(255,255,255,.08);color:#fff}

#main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sb{width:var(--sidebar-w);flex-shrink:0;background:var(--dark);border-right:1px solid rgba(255,255,255,.05);overflow-y:auto;display:flex;flex-direction:column;transition:width .2s}
#sb.closed{width:0;overflow:hidden}
.sb-top{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.06);background:linear-gradient(135deg,rgba(61,80,244,.18) 0%,rgba(53,255,233,.04) 100%)}
.sb-top-lbl{font-size:9px;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:12px}
.sb-cards{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.sb-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);padding:10px 12px}
.sb-card-n{font-size:22px;font-weight:700;font-family:var(--mono);color:#fff;line-height:1}
.sb-card-n.c{color:var(--cyan)}
.sb-card-l{font-size:10px;color:rgba(255,255,255,.4);margin-top:3px}
.sb-mods{padding:6px 0 20px}
.sb-grp{padding:12px 16px 4px;font-size:9px;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3)}
.mi{cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.mi:hover{background:rgba(255,255,255,.04)}
.mi.on{background:rgba(61,80,244,.16);border-left-color:var(--royal)}
.mi-hdr{display:flex;align-items:center;gap:9px;padding:8px 14px}
.mi-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:rgba(255,255,255,.06)}
.mi.on .mi-ico{background:rgba(61,80,244,.28)}
.mi-info{flex:1;min-width:0}
.mi-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.mi.on .mi-name{color:#fff}
.mi-meta{display:flex;align-items:center;gap:5px;margin-top:2px}
.mi-id{font-size:9px;font-family:var(--mono);color:rgba(255,255,255,.3)}
.mi.on .mi-id{color:rgba(61,80,244,.75)}
.mi-t{font-size:9px;font-family:var(--mono);color:rgba(255,255,255,.25)}
.mi-ck{width:15px;height:15px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:7px;flex-shrink:0}
.mi-ck.ok{background:rgba(53,255,233,.14);border-color:var(--cyan);color:var(--cyan)}
.si-list{padding:1px 0 6px}
.si{display:flex;align-items:center;gap:7px;padding:5px 14px 5px 48px;cursor:pointer;transition:background .12s}
.si:hover{background:rgba(255,255,255,.04)}
.si.on{background:rgba(61,80,244,.1)}
.si-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:5px;transition:all .15s}
.si-dot.ok{border-color:var(--cyan);background:rgba(53,255,233,.18);color:var(--cyan)}
.si-dot.cur{border-color:var(--royal);background:rgba(61,80,244,.28)}
.si-lbl{font-size:11px;color:rgba(255,255,255,.45);line-height:1.35}
.si.on .si-lbl{color:rgba(255,255,255,.85)}
.si.done .si-lbl{color:rgba(53,255,233,.55)}

/* CONTENT */
#ct{flex:1;overflow-y:auto;background:var(--bg)}
#cti{max-width:720px;margin:0 auto;padding:36px 44px 90px}

/* LESSON HEADER */
.lhdr{background:var(--surface);border:1px solid var(--border);border-radius:var(--rxl);padding:24px 28px;margin-bottom:26px;box-shadow:var(--sh)}
.lcrumb{display:flex;align-items:center;gap:8px;margin-bottom:11px;flex-wrap:wrap}
.lcrumb-ico{width:20px;height:20px;border-radius:5px;background:rgba(61,80,244,.1);display:flex;align-items:center;justify-content:center;font-size:10px}
.lcrumb-chev{color:var(--muted);font-size:11px}
.badge{font-size:9px;font-family:var(--mono);padding:3px 8px;border-radius:20px;letter-spacing:.4px;font-weight:600;border:1px solid}
.badge-key{background:rgba(250,41,95,.08);color:#C8144A;border-color:rgba(200,20,74,.22)}
.ltitle{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px;line-height:1.25;margin-bottom:10px}
.lmeta{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.lmi{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);font-family:var(--mono)}
.lmi svg{width:12px;height:12px;opacity:.55}
.lpbar{height:3px;background:var(--border);border-radius:2px;margin-top:12px;overflow:hidden}
.lpfill{height:100%;background:linear-gradient(90deg,var(--royal),var(--cyan));border-radius:2px;transition:width .4s}

/* BODY */
.btext p{font-size:15px;line-height:1.82;color:var(--text2);margin-bottom:15px}

/* CALLOUTS */
.co{padding:14px 18px;border-radius:var(--rl);margin:18px 0;font-size:14px;line-height:1.7;border:1px solid}
.co-blue{background:rgba(61,80,244,.06);border-color:rgba(61,80,244,.2);color:#1A2880}
.co-green{background:var(--green-bg);border-color:var(--green-bdr);color:var(--green)}
.co-amber{background:var(--amber-bg);border-color:var(--amber-bdr);color:var(--amber)}
.co-red{background:rgba(200,20,74,.07);border-color:rgba(200,20,74,.22);color:#8A1A1A}
.co-lbl{font-size:9px;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;opacity:.65;font-weight:700}

/* PERSONA CARDS */
.persona-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}
.persona-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;box-shadow:var(--sh);transition:all .15s;cursor:pointer}
.persona-card:hover{border-color:rgba(61,80,244,.3);box-shadow:0 4px 20px rgba(61,80,244,.1);transform:translateY(-1px)}
.persona-card.primary{border-color:rgba(61,80,244,.25);background:rgba(61,80,244,.03)}
.persona-card.secondary{border-color:rgba(53,255,233,.15);background:rgba(53,255,233,.02)}
.persona-card.tertiary{border-color:rgba(255,255,255,.15);background:var(--card)}
.pc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pc-title{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.pc-badge{font-size:9px;font-family:var(--mono);padding:3px 8px;border-radius:20px;letter-spacing:.5px;font-weight:600;border:1px solid}
.pcb-primary{background:rgba(61,80,244,.1);color:var(--royal);border-color:rgba(61,80,244,.25)}
.pcb-secondary{background:rgba(53,255,233,.1);color:#0A7A6A;border-color:rgba(53,255,233,.3)}
.pcb-tertiary{background:var(--card);color:var(--muted);border-color:var(--border)}
.pc-role{font-size:11px;font-family:var(--mono);color:var(--muted);margin-bottom:10px;letter-spacing:.3px}
.pc-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.pc-tags{display:flex;flex-wrap:wrap;gap:5px}
.pc-tag{font-size:10px;font-family:var(--mono);background:var(--card);border:1px solid var(--border);color:var(--muted);padding:2px 8px;border-radius:10px}

/* SENIORITY TABLE */
.sen-table{margin:20px 0;border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh)}
.sen-hdr{display:grid;grid-template-columns:2fr 2fr 3fr 2fr;gap:0;background:var(--navy);padding:10px 16px}
.sen-hdr-cell{font-size:10px;font-family:var(--mono);color:rgba(255,255,255,.5);letter-spacing:1px;text-transform:uppercase;font-weight:600}
.sen-row{display:grid;grid-template-columns:2fr 2fr 3fr 2fr;gap:0;padding:12px 16px;border-top:1px solid var(--border);transition:background .12s}
.sen-row:hover{background:rgba(61,80,244,.03)}
.sen-row.tier1{background:rgba(61,80,244,.04)}
.sen-row.tier2{background:rgba(53,255,233,.03)}
.sen-cell{font-size:12px;color:var(--text2);padding-right:12px;line-height:1.4}
.sen-cell strong{color:var(--text);font-weight:600;display:block;margin-bottom:2px}
.sen-cell.alt{font-size:11px;color:var(--muted);font-family:var(--mono)}
.tier-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-family:var(--mono);padding:3px 8px;border-radius:10px;font-weight:600;letter-spacing:.5px}
.tb1{background:rgba(61,80,244,.1);color:var(--royal);border:1px solid rgba(61,80,244,.2)}
.tb2{background:rgba(53,255,233,.08);color:#0A7A6A;border:1px solid rgba(53,255,233,.2)}
.tb3{background:var(--card);color:var(--muted);border:1px solid var(--border)}

/* FIRM TYPE CARDS */
.firm-grid{display:grid;grid-template-columns:1fr;gap:12px;margin:20px 0}
.firm-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;box-shadow:var(--sh)}
.firm-card-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.firm-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.firm-card-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.firm-card-sub{font-size:11px;font-family:var(--mono);color:var(--muted);margin-top:2px}
.firm-desc{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:14px}
.firm-examples{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.firm-ex{font-size:11px;font-family:var(--mono);background:var(--card);border:1px solid var(--border);color:var(--text2);padding:3px 10px;border-radius:6px;font-weight:500}
.firm-why{background:rgba(61,80,244,.05);border:1px solid rgba(61,80,244,.15);border-radius:var(--r);padding:10px 14px;font-size:12px;color:#1A2880;line-height:1.55}
.firm-why-lbl{font-size:9px;font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;color:rgba(61,80,244,.6);margin-bottom:4px;font-weight:700}

/* APPROACH CARDS */
.approach-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:20px 0}
.ap-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;box-shadow:var(--sh)}
.ap-level{font-size:9px;font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;font-weight:700}
.ap-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;letter-spacing:-.2px}
.ap-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.ap-do{font-size:11px;color:var(--green);font-family:var(--mono);margin-bottom:3px}
.ap-dont{font-size:11px;color:#8A1A1A;font-family:var(--mono);margin-bottom:3px}

/* PROSE */
.prose{background:var(--dark);border:1px solid rgba(255,255,255,.07);border-radius:var(--rl);padding:20px 24px;margin:20px 0;font-size:13px;line-height:1.9;color:rgba(255,255,255,.65);white-space:pre-wrap;font-family:var(--mono)}

/* FINN */
.fw{margin-top:32px;border-radius:var(--rxl);overflow:hidden;border:1px solid var(--border);background:var(--surface);box-shadow:var(--shm)}
.fh{height:52px;display:flex;align-items:center;gap:12px;padding:0 18px;background:var(--navy)}
.fav-wrap{position:relative}
.fav{width:32px;height:32px;border-radius:8px;background:var(--royal);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.fon{position:absolute;bottom:-1px;right:-1px;width:9px;height:9px;border-radius:50%;background:var(--cyan);border:2px solid var(--navy)}
.finfo{flex:1}
.fname{font-size:13px;color:#fff;font-weight:700}
.fsub{font-size:9px;color:rgba(255,255,255,.4);font-family:var(--mono);margin-top:1px}
.fai{font-size:9px;font-family:var(--mono);background:rgba(53,255,233,.12);color:var(--cyan);border:1px solid rgba(53,255,233,.22);padding:3px 8px;border-radius:20px;letter-spacing:.5px;font-weight:600}
.fmsgs{max-height:380px;overflow-y:auto;padding:16px 18px;display:none;background:var(--card)}
.fmsgs.vis{display:block}
.mr{display:flex;gap:9px;margin-bottom:13px}
.mr.u{justify-content:flex-end}
.mav{width:24px;height:24px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-family:var(--mono);margin-top:1px;font-weight:700}
.mav.f{background:var(--royal);color:#fff}
.mav.y{background:var(--navy);color:rgba(255,255,255,.6)}
.mb{max-width:80%;padding:10px 14px;font-size:14px;line-height:1.75;white-space:pre-wrap;word-break:break-word;border-radius:var(--r)}
.mb.f{background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:2px var(--r) var(--r) var(--r)}
.mb.u{background:var(--navy);color:rgba(255,255,255,.82);border-radius:var(--r) 2px var(--r) var(--r)}
.tdots{display:flex;gap:5px;padding:3px 0;align-items:center}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--royal);animation:dot 1.2s infinite}
.fst{padding:13px 18px;background:var(--card);border-bottom:1px solid var(--border)}
.fst-lbl{font-size:9px;font-family:var(--mono);color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:9px;font-weight:700}
.fst-g{display:flex;flex-wrap:wrap;gap:6px}
.fsbtn{background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .15s;font-family:var(--font)}
.fsbtn:hover{background:rgba(61,80,244,.06);border-color:rgba(61,80,244,.3);color:var(--royal)}
.fin{display:flex;gap:8px;padding:11px 14px;border-top:1px solid var(--border)}
.fta{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:9px 13px;font-size:14px;font-family:var(--font);color:var(--text);resize:none;max-height:100px;line-height:1.5;transition:border-color .15s}
.fta:focus{outline:none;border-color:var(--royal);background:var(--surface)}
.fta::placeholder{color:var(--muted)}
.fsnd{width:38px;height:38px;border-radius:var(--r);border:none;background:var(--royal);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:flex-end;transition:all .15s}
.fsnd:hover{background:var(--royal2);transform:scale(1.04)}
.fsnd:disabled{background:var(--faint);cursor:default;transform:none}

/* NAV */
.lnav{margin-top:40px;padding-top:22px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.nbk{display:flex;align-items:center;gap:7px;padding:10px 18px;border-radius:var(--r);border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-family:var(--mono);font-weight:600;transition:all .15s}
.nbk:hover:not(:disabled){background:var(--card);color:var(--text)}
.nbk:disabled{color:var(--faint);border-color:var(--faint);cursor:default}
.nnx{display:flex;align-items:center;gap:8px;padding:11px 22px;border-radius:var(--r);border:none;background:var(--royal);color:#fff;cursor:pointer;font-size:12px;font-family:var(--mono);font-weight:700;letter-spacing:.3px;transition:all .15s;box-shadow:0 2px 12px rgba(61,80,244,.3)}
.nnx:hover{background:var(--royal2);box-shadow:0 4px 20px rgba(61,80,244,.4);transform:translateY(-1px)}
.nnx.done{background:var(--green);box-shadow:0 2px 12px rgba(10,122,74,.25)}

@media(max-width:700px){
  #cti{padding:20px 16px 80px}
  #sb{position:fixed;top:0;left:0;height:100vh;z-index:300}
  #sb.closed{width:0}
  .tb-sec{display:none}
  .persona-grid{grid-template-columns:1fr}
  .approach-grid{grid-template-columns:1fr}
  .sen-hdr,.sen-row{grid-template-columns:1fr 1fr}
}

/* LISTEN BUTTON */
.listen-btn{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:12px;font-family:var(--mono);font-weight:600;letter-spacing:.5px;transition:all .15s}
.listen-btn:hover{border-color:var(--royal);color:var(--royal);background:rgba(61,80,244,.05)}
.listen-btn.playing{border-color:var(--royal);color:var(--royal);background:rgba(61,80,244,.08)}
.stop-btn{border-color:rgba(200,20,74,.3)!important;color:#C8144A!important;background:rgba(200,20,74,.06)!important}
.listen-btn.playing:hover{border-color:var(--red);color:var(--red);background:rgba(200,20,74,.06)}

.dataset-card{background:var(--surface);border-radius:var(--rxl);padding:20px 22px;box-shadow:var(--sh);transition:all .15s;margin-bottom:12px}

.dc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.dc-left{display:flex;align-items:flex-start;gap:12px}
.dc-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.critical .dc-icon{background:rgba(61,80,244,.1);border:1px solid rgba(61,80,244,.2)}
.supporting .dc-icon{background:var(--green-bg);border:1px solid var(--green-bdr)}
.dc-name{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px;margin-bottom:3px}
.dc-sub{font-size:12px;font-family:var(--mono);color:var(--muted)}
.dc-badge{font-size:9px;font-family:var(--mono);padding:4px 10px;border-radius:20px;letter-spacing:.5px;font-weight:700;border:1px solid;flex-shrink:0}
.badge-critical{background:rgba(61,80,244,.1);color:var(--royal);border-color:rgba(61,80,244,.25)}
.badge-supporting{background:var(--green-bg);color:var(--green);border-color:var(--green-bdr)}
.badge-conditional{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bdr)}
.dc-body{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding-top:14px;border-top:1px solid var(--border)}
.dc-section-lbl{font-size:9px;font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:600}

.dc-formats{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.dc-format{font-size:10px;font-family:var(--mono);background:var(--card);border:1px solid var(--border);color:var(--text2);padding:2px 8px;border-radius:5px;font-weight:500}
.dc-format.preferred{background:rgba(61,80,244,.08);border-color:rgba(61,80,244,.2);color:var(--royal)}
.req-checklist{display:flex;flex-direction:column;gap:7px;margin:18px 0}
.req-item{display:flex;align-items:center;gap:12px;padding:11px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .15s}
.req-item:hover{border-color:var(--rbb)}
.req-item.checked{background:var(--green-bg);border-color:var(--green-bdr)}
.req-box{width:18px;height:18px;border-radius:5px;flex-shrink:0;border:1.5px solid var(--faint);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:all .15s}
.req-item.checked .req-box{background:var(--green);border-color:var(--green);color:#fff}
.req-label{font-size:13px;color:var(--text2);font-weight:400;flex:1}
.req-item.checked .req-label{text-decoration:line-through;color:var(--muted)}
.req-badge{font-size:9px;font-family:var(--mono);padding:2px 7px;border-radius:10px;font-weight:700;flex-shrink:0;border:1px solid}
.badge-platform{background:rgba(61,80,244,.1);color:var(--royal);border-color:rgba(61,80,244,.25);font-size:9px;font-family:var(--mono);padding:3px 8px;border-radius:20px;letter-spacing:.4px;font-weight:600}

/* EXAMPLE PREVIEW */
/* CTA BANNER - sits between card header and detail sections */
.dc-example-cta{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;background:linear-gradient(135deg,rgba(61,80,244,.07) 0%,rgba(53,255,233,.05) 100%);border:1.5px solid rgba(61,80,244,.2);border-radius:var(--r);margin:12px 0 4px;flex-wrap:wrap}

.dc-example-wrap{grid-column:1/-1;margin-top:14px;padding-top:14px;border-top:1px dashed var(--border)}
.dc-toggle{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:var(--r);border:1.5px solid rgba(61,80,244,.25);background:rgba(61,80,244,.06);color:var(--royal);cursor:pointer;font-size:11px;font-family:var(--mono);font-weight:700;letter-spacing:.5px;transition:all .15s}

.dc-example{display:none;margin-top:14px;animation:fadeUp .25s ease-out}
.dc-example.open{display:block}
.dc-example-title{font-size:11px;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;font-weight:700}
.dc-example-sub{font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.5}
.ex-tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);box-shadow:var(--sh)}
.ex-tbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;min-width:560px}
.ex-tbl thead{background:var(--navy)}
.ex-tbl thead th{color:rgba(255,255,255,.85);font-weight:600;text-align:left;padding:9px 12px;font-size:10px;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;border-right:1px solid rgba(255,255,255,.08)}
.ex-tbl thead th:last-child{border-right:none}
.ex-tbl tbody tr{border-top:1px solid var(--border);transition:background .12s}
.ex-tbl tbody tr:hover{background:rgba(61,80,244,.03)}
.ex-tbl tbody tr.section-row{background:rgba(61,80,244,.05);font-weight:700}
.ex-tbl tbody tr.total-row{background:var(--card);font-weight:700;border-top:2px solid var(--text)}
.ex-tbl tbody tr.subtotal-row{background:rgba(61,80,244,.04);font-weight:600}
.ex-tbl tbody td{padding:7px 12px;color:var(--text2);border-right:1px solid var(--border);white-space:nowrap}
.ex-tbl tbody td:last-child{border-right:none}
.ex-tbl tbody td.num{text-align:right;font-variant-numeric:tabular-nums}
.ex-tbl tbody td.neg{color:var(--red)}
.ex-tbl tbody td.amber-cell{color:var(--amber);font-weight:600}
.ex-tbl tbody td.red-cell{color:var(--red);font-weight:600}
.ex-tbl tbody td.label-strong{color:var(--text);font-weight:600}
.ex-note{margin-top:10px;font-size:11px;color:var(--muted);line-height:1.5;padding:8px 12px;background:rgba(61,80,244,.04);border-left:3px solid var(--royal);border-radius:0 var(--r) var(--r) 0}
.ex-note b{color:var(--royal);font-weight:700}

<script>
const MODULES = [
  {
    id:"M1", icon:"📦", title:"What PinpointAI Needs", subtitle:"The datasets that power the platform", time:15,
    starters:[
      "I have no accounting background - can you explain why we need all these datasets?",
      "What is the difference between a trial balance and a general ledger in plain English?",
      "What is a chart of accounts? Why does it matter?",
      "What happens if the seller can only give us some of the datasets?"
    ],
    sections:[
      {id:"M1S1", title:"Why the data you collect matters",
       content:"PinpointAI is software that automates the most time-consuming parts of financial due diligence (FDD). FDD just means checking that a company's reported numbers actually hold up before someone buys it.\n\nBut the platform can only work with what it is given. The quality, completeness, and format of the data uploaded directly determines the quality of the output. Clean, well-structured spreadsheets produce a detailed, accurate analysis. A single scanned PDF produces a much more limited result.\n\nThis module walks you through every dataset PinpointAI needs, what each one actually is in plain English, why it matters, and how to ask for it. By the end you will be able to walk a client through their data requirements with confidence, even if you have no accounting background.",
       callout:{type:"blue",label:"Quick translator - terms you will see",text:"FDD = Financial Due Diligence (checking the numbers before a deal)\nIRL = Information Request List (the list of things you ask the seller for)\nP&L = Profit and Loss statement (revenue minus costs = profit)\nGL = General Ledger (the master record of every transaction)\nTB = Trial Balance (a summary of every account at a point in time)\nCOA = Chart of Accounts (the list of all account categories used)\nEBITDA = Earnings Before Interest, Tax, Depreciation, Amortisation (a profit measure)\nDebtors = customers who owe the business money\nCreditors = suppliers the business owes money to\n\nDo not worry about memorising these. Each one is explained again where it appears."}
      },
      {id:"M1S2", title:"Critical datasets - needed for every engagement",
       content:"These four datasets are needed for PinpointAI to run a full analysis. Without all four the platform output will be materially limited.\n\nThink of it like this: if PinpointAI was a cake, these four datasets are the flour, eggs, sugar, and butter. You can make do without one or two for a basic version, but the result will be much weaker.\n\nRequest these on day one of every engagement. Each card below explains what the dataset actually is, why PinpointAI needs it, and what good looks like - click 'View example data' to see what one looks like in practice.",
       type:"critical"
      },
      {id:"M1S3", title:"Supporting datasets - strongly recommended",
       content:"These datasets are not strictly required for the platform to function but significantly enhance the depth and accuracy of the analysis.\n\nIncluding them gives PinpointAI more to work with - things like customer concentration analysis, debtor (customer) and creditor (supplier) quality assessment, and working capital insights.\n\nInclude them in your IRL (Information Request List - the document you send the seller asking for everything you need) alongside the critical datasets.",
       type:"supporting"
      }
    ]
  },
  {
    id:"M2", icon:"📋", title:"Requesting the Data", subtitle:"How to ask for what you need", time:15,
    starters:[
      "What exactly is an IRL and what should be in it?",
      "How do I explain to a seller in plain English why we need a trial balance?",
      "What if the target uses Xero or QuickBooks - where do these files come from?",
      "How long should it take a target to provide these datasets?"
    ],
    sections:[
      {id:"M2S1", title:"What is an IRL and how to build the data request into it",
       content:"An IRL stands for Information Request List. It is the document you send the seller at the very start of a deal listing every piece of information you need from them - financials, contracts, employee records, tax filings, customer data, the lot.\n\nThink of it as a shopping list for the deal. The seller works through it and uploads everything to a shared folder (often called a 'data room').\n\nThe PinpointAI data requirements should be a dedicated section of the IRL, clearly labelled with specific format guidance. Do not bury the data request in a general list of financial information. Be explicit: name each dataset, specify the format (Excel preferred), and state the period required (usually 36 months / 3 years).",
       callout:{type:"green",label:"Suggested IRL wording (copy and paste)",text:"Section 4 - PinpointAI Platform Data\n\n4.1  Monthly Management Accounts (Profit & Loss and Balance Sheet) for the 36 months ended [date] - Excel format preferred\n4.2  Chart of Accounts (the list of all account codes used) - Excel or CSV export from accounting system\n4.3  Monthly Trial Balance for the 36 months ended [date] - Excel or CSV export\n4.4  Monthly General Ledger for the 36 months ended [date] - Excel or CSV export\n4.5  Aged Debtors schedule (customers who owe money) at [most recent month end] - Excel format\n4.6  Aged Creditors schedule (suppliers owed money) at [most recent month end] - Excel format"}
      },
      {id:"M2S2", title:"Accounting systems and what they can export",
       content:"Most small to mid-sized companies use one of a handful of accounting software systems (Xero, Sage, QuickBooks, NetSuite). These are tools the finance team uses to record every transaction the business makes.\n\nAll of them can export the data PinpointAI needs. The challenge is that the finance team may never have been asked for these specific exports before, so they might not know exactly where to find them. Having a quick guide ready helps avoid back-and-forth.",
       type:"systems"
      },
      {id:"M2S3", title:"What to do when data is missing or incomplete",
       content:"Even with a clear IRL you will sometimes receive incomplete data. Always document what was requested, what was received, and when.\n\nIf a critical dataset is missing, escalate to the client (the buyer who hired you) immediately. Do not just push on and hope - it will affect the quality of your work and the value of the platform output.",
       callout:{type:"amber",label:"If a critical dataset is missing",text:"If any of the four critical datasets is missing, tell the client (the buyer) immediately. The platform output will be materially weaker. Do not attempt to push on and hope for the best - it always comes back to bite."},
       callout2:{type:"blue",label:"If a supporting dataset is missing",text:"If a supporting dataset (e.g. aged debtors) is missing, note it in your engagement tracker and continue. Flag it in your final report as a limitation - meaning, a known gap in what you were able to analyse."}
      }
    ]
  },
  {
    id:"M3", icon:"✅", title:"Pre-Upload Checklist", subtitle:"Before you upload to PinpointAI", time:10,
    starters:[
      "What are the most common data quality issues before upload?",
      "How do I check if a trial balance is complete?",
      "What does PinpointAI do if there are gaps in the monthly data?",
      "Is there a standard file naming convention?"
    ],
    sections:[
      {id:"M3S1", title:"Checking data quality before you upload",
       content:"Before uploading anything to PinpointAI, run through the checklist below. The most common issues are:\n\n1) Missing months in the data (e.g. you have Jan-Nov but no December)\n2) Management accounts that do not 'reconcile' to the trial balance - meaning the totals do not match. The numbers should agree because they come from the same source\n3) A chart of accounts that has been restructured halfway through the period (account codes changed names or were merged)\n4) Aged debtor/creditor schedules dated at the wrong month end\n\nTaking 15 minutes to check these things before upload saves hours of rework later.",
       type:"checklist"
      },
      {id:"M3S2", title:"How much data do we need? (Period coverage)",
       content:"PinpointAI works best with 36 months (3 years) of monthly data. This gives the platform enough history to:\n\n- Spot trends (is revenue growing, flat, or declining?)\n- Account for seasonality (some businesses make most of their money in Q4)\n- Build a meaningful 'quality of earnings' analysis (essentially: how reliable are the reported profits?)\n\nAlways use the most recent 36 months available. If the engagement is running in April 2024, the ideal period is April 2021 to March 2024.",
       callout:{type:"blue",label:"How much is enough?",text:"Ideal: 36 months of monthly data, most recent first.\n\nMinimum workable: 24 months.\n\nUnder 12 months: flag this to the client as a material limitation before proceeding. The analysis will be much weaker."}
      }
    ]
  }
];

const CRITICAL_DATASETS = [
  {icon:"\u{1F4CA}",name:"Monthly Management Accounts",sub:"Profit & Loss (P&L) and Balance Sheet",badge:"CRITICAL",badgeClass:"badge-critical",cardClass:"critical",
   what:"The internal financial reports the business produces every month for its own management team. There are two parts:\n\n1) Profit & Loss (P&L) - shows revenue minus costs to arrive at profit for the month\n2) Balance Sheet - a snapshot at month end showing what the business owns (assets), owes (liabilities), and what is left over (equity)\n\nThese are produced by the finance team and used internally to track performance.",
   why:"PinpointAI needs monthly numbers (not just annual) so it can spot trends, identify unusual months, and build an accurate 'LTM' figure (Last Twelve Months - the most recent 12 months of trading, often used as the basis for valuation).",
   formats:["Excel (.xlsx)","CSV","Google Sheets export"],preferred:"Excel (.xlsx)",
   period:"36 months (3 full financial years)",
   notes:"Must include both the P&L and the Balance Sheet (often on separate tabs). If the company is part of a larger group and the accounts cover multiple entities, ask specifically for accounts of just the business being bought."},
  {icon:"\u{1F5C2}\uFE0F",name:"Chart of Accounts",sub:"The full list of categories used to record transactions",badge:"CRITICAL",badgeClass:"badge-critical",cardClass:"critical",
   what:"Often shortened to 'COA'. Think of it as the master index of every category the accounting system uses to bucket transactions - 'Subscription Revenue', 'Office Rent', 'Salaries - Sales', and so on.\n\nEach category has a code (a 'nominal code' or 'GL code' - same thing, e.g. 4000, 6001) and a description. Every transaction the business records gets posted to one of these codes.",
   why:"The trial balance and general ledger contain hundreds of code numbers. Without the chart of accounts to translate them, the data is just a list of numbers with no meaning. PinpointAI uses the chart to know that '6000 = Salaries' so it can group costs correctly.",
   formats:["Excel (.xlsx)","CSV","Direct export from accounting system"],preferred:"CSV export from accounting system",
   period:"Current - as at the most recent month end",
   notes:"If the company has reorganised its categories during the 3-year period (e.g. merged or renamed codes), ask for both the current and the older versions, plus the date of the change."},
  {icon:"\u2696\uFE0F",name:"Monthly Trial Balance",sub:"A monthly summary showing every account's balance",badge:"CRITICAL",badgeClass:"badge-critical",cardClass:"critical",
   what:"Often shortened to 'TB'. A list, produced at the end of every month, showing every active account code (from the Chart of Accounts) and what its balance is at that point in time.\n\nIt is called a 'trial balance' because if the bookkeeping has been done correctly, the total of all debits should equal the total of all credits - the books 'balance'.\n\nIt is essentially a structured summary of the entire business at one moment.",
   why:"The trial balance is the most reliable source of financial data because it comes directly from the accounting system. PinpointAI uses it to cross-check the management accounts and build the analysis from the ground up - making sure the reported numbers are real.",
   formats:["Excel (.xlsx)","CSV","Direct export from Xero, Sage, QuickBooks, NetSuite"],preferred:"CSV export from accounting system",
   period:"One trial balance per month, for 36 months",
   notes:"You need a separate trial balance for each month-end (so 36 trial balances for 3 years), not just one combined version."},
  {icon:"\u{1F4D6}",name:"Monthly General Ledger",sub:"The full record of every transaction the business has made",badge:"CRITICAL",badgeClass:"badge-critical",cardClass:"critical",
   what:"Often shortened to 'GL'. The general ledger is the master record of every single transaction the business has posted, line by line.\n\nIf the trial balance is the summary (\"Salaries account total: £120,000 in March\"), the general ledger is the detail (\"15 Mar - John Smith salary - £4,200; 15 Mar - Jane Doe salary - £3,800; ...\").\n\nThink of the trial balance as the table of contents and the general ledger as the full book.",
   why:"PinpointAI uses the general ledger to investigate unusual items at transaction level - for example, the platform can identify a single £56k payment in marketing for an annual rebrand, separate from regular monthly spend. This is the kind of detail that drives EBITDA adjustments.\n\nWithout it, the analysis is limited to monthly totals and cannot dig into specific transactions.",
   formats:["Excel (.xlsx)","CSV","Direct export from accounting system"],preferred:"CSV export from accounting system",
   period:"Monthly for 36 months (or as one continuous file covering 36 months)",
   notes:"The export should include: transaction date, account code, description, debit amount, credit amount, and a reference (invoice number, journal number). If the seller resists due to file size, accept it month by month."}
];

const SUPPORTING_DATASETS = [
  {icon:"\u{1F465}",name:"Customer List / Schedule",sub:"List of customers and what they pay - only needed in some cases",badge:"CONDITIONAL",badgeClass:"badge-conditional",cardClass:"supporting",
   what:"A list of all the company's customers, showing how much each one pays, ideally with a unique customer ID or code.\n\nWhy 'conditional'? Some businesses set up their accounting system so that each customer has its own dedicated revenue code (e.g. customer A = code 4001, customer B = code 4002). In that case, this list is needed to translate the codes back into customer names.\n\nOther businesses post all revenue to one general code. In that case, this list is not strictly needed - but is still useful for concentration analysis.",
   why:"PinpointAI uses this to identify concentration risk - meaning, how dependent is the business on a small number of customers? Losing a top-3 customer is a much bigger deal than losing a 50th customer.",
   formats:["Excel (.xlsx)","CSV","CRM export"],preferred:"Excel (.xlsx)",
   period:"Matching the trial balance period",
   notes:"Ask the seller: 'Are customers tagged with unique account codes in your accounting system?' If yes, this dataset is essential. If no, it is still strongly recommended."},
  {icon:"\u{1F4E5}",name:"Aged Debtors (Receivables)",sub:"List of customers who owe the business money",badge:"SUPPORTING",badgeClass:"badge-supporting",cardClass:"supporting",
   what:"'Debtors' is the British accounting word for customers who owe the business money (i.e. invoices that have been issued but not yet paid). 'Receivables' is the American word for the same thing.\n\nThe 'aged' bit means the report groups these unpaid invoices by how old they are: under 30 days (current), 31-60 days, 61-90 days, 90+ days. The older an invoice gets, the less likely it is to be paid.",
   why:"PinpointAI uses this to assess the quality of the debtor balance. A business with lots of old, unpaid invoices may be overstating its profits (because some of these invoices may never be collected). It also feeds into the 'working capital' analysis - which affects the final price the buyer pays.",
   formats:["Excel (.xlsx)","CSV","Export from accounting system"],preferred:"Excel (.xlsx)",

function renderExampleInline(name){
  var ex=EXAMPLES[name];
  if(!ex) return "";
  var safeId="ex-"+name.replace(/[^a-zA-Z0-9]/g,"");
  var headerRow="<tr>"+ex.headers.map(function(h){return "<th>"+h+"</th>"}).join("")+"</tr>";
  var bodyRows=ex.rows.map(function(r){
    var cls=r.section==="total"?"total-row":r.section==="subtotal"?"subtotal-row":r.section==="section"?"section-row":"";
    var cells=r.cells.map(function(c,i){
      var cellCls=(r.cls&&r.cls[i])?" class=\""+r.cls[i]+"\"":"";
      return "<td"+cellCls+">"+c+"</td>"
    }).join("");
    return "<tr"+(cls?" class=\""+cls+"\"":"")+">"+cells+"</tr>"
  }).join("");
  return "<div id=\""+safeId+"\" class=\"dc-example\">"+
    "<div class=\"dc-example-title\">"+ex.title+"</div>"+
    "<div class=\"dc-example-sub\">"+ex.sub+"</div>"+
    "<div class=\"ex-tbl-wrap\"><table class=\"ex-tbl\"><thead>"+headerRow+"</thead><tbody>"+bodyRows+"</tbody></table></div>"+
    (ex.note?"<div class=\"ex-note\">"+ex.note+"</div>":"")+
  "</div>"
}

function toggleExampleCta(btn,id){
  var ex=document.getElementById(id);

  if(lbl) lbl.textContent=open?"Hide example":"View example data";
}

      "</div>" +
    "</div>"
  }).join("")
}


function renderSystems(){
  return "<div style=\"display:flex;flex-direction:column;gap:10px;margin:18px 0\">" +
    SYSTEMS.map(function(s){
      return "<div style=\"background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 18px;box-shadow:var(--sh)\">" +
        "<div style=\"display:flex;align-items:center;gap:12px;margin-bottom:8px\">" +
          "<div style=\"font-size:14px;font-weight:700;color:var(--text)\">"+s.name+"</div>" +
          "<div style=\"font-size:11px;font-family:var(--mono);color:var(--muted)\">"+s.common+"</div>" +
        "</div>" +
        "<div style=\"font-size:13px;color:var(--text2);line-height:1.6\"><span style=\"font-size:10px;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;color:var(--royal);font-weight:700;margin-right:8px\">How to export</span>"+s.export+"</div>" +
      "</div>"
    }).join("") + "</div>"
}

function renderChecklist(){
  return "<div class=\"req-checklist\">" +
    CHECKLIST_ITEMS.map(function(item){
      return "<div class=\"req-item\" onclick=\"ckToggle(this)\">" +
        "<div class=\"req-box\"></div>" +
        "<div class=\"req-label\">"+item.label+"</div>" +
        "<span class=\"req-badge\" style=\"background:"+(item.critical?"rgba(200,20,74,.08)":"rgba(10,122,74,.08)")+";color:"+(item.critical?"var(--red)":"var(--green)")+";border-color:"+(item.critical?"rgba(200,20,74,.2)":"rgba(10,122,74,.2)")+"\">"+
          (item.critical?"CRITICAL":"RECOMMENDED")+
        "</span>" +
      "</div>"
    }).join("") + "</div>"
}

function ckToggle(el){el.classList.toggle("checked");el.querySelector(".req-box").textContent=el.classList.contains("checked")?"\u2713":"";}

function renderCO(c){
  if(!c) return "";
  var icons={blue:"\u24d8",green:"\u2713",amber:"\u26a0",red:"\u26a0"};
  return "<div class=\"co co-"+c.type+"\"><div class=\"co-lbl\">"+(icons[c.type]||"")+" "+(c.label||"")+"</div>"+c.text.replace(/\n/g,"<br>")+"</div>"
}

async function finnSend(q){
  var key=cK();
  if(!chats[key]) chats[key]=[];
  chats[key].push({role:"user",content:q});
  var msgs=document.getElementById("fmsgs");
  if(msgs){msgs.classList.add("vis");finnRender(key);}
  var st=document.getElementById("fst");if(st)st.style.display="none";
  var ld=document.createElement("div");ld.id="fld";ld.className="mr fu";
  ld.innerHTML="<div class=\"mav f\">F</div><div class=\"mb f\"><div class=\"tdots\"><div class=\"tdot\" style=\"animation-delay:0s\"></div><div class=\"tdot\" style=\"animation-delay:.2s\"></div><div class=\"tdot\" style=\"animation-delay:.4s\"></div></div></div>";
  if(msgs){msgs.appendChild(ld);msgs.scrollTop=msgs.scrollHeight;}
  var sec=MODULES[aM].sections[aS];
  try{
    var res=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:800,
        system:FINN_SYS+"\n\nCurrent section: "+sec.title+".",messages:chats[key]})});
    var data=await res.json();
    var reply=(data.content&&data.content.find(function(b){return b.type==="text"}))||{text:"Something went wrong."};
    chats[key].push({role:"assistant",content:reply.text});
  }catch(e){chats[key].push({role:"assistant",content:"Network error - please try again."});}
  var ld2=document.getElementById("fld");if(ld2)ld2.remove();
  finnRender(key);
}
function finnRender(key){
  var div=document.getElementById("fmsgs");if(!div)return;
  div.innerHTML=(chats[key]||[]).map(function(m){
    return "<div class=\"mr "+(m.role==="user"?"u":"")+" fu\">"+
      (m.role==="assistant"?"<div class=\"mav f\">F</div>":"")+
      "<div class=\"mb "+(m.role==="assistant"?"f":"u")+"\">"+m.content.replace(/\n/g,"<br>")+"</div>"+
      (m.role==="user"?"<div class=\"mav y\">M</div>":"")+
    "</div>"
  }).join("");
  div.scrollTop=div.scrollHeight;
}
function finnKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();finnSubmit();}var ta=document.getElementById("fta");if(ta){ta.style.height="auto";ta.style.height=Math.min(ta.scrollHeight,100)+"px";}}
function finnSubmit(){var ta=document.getElementById("fta");var q=ta?ta.value.trim():"";if(!q)return;ta.value="";ta.style.height="auto";finnSend(q);}
function totSec(){return MODULES.reduce(function(a,m){return a+m.sections.length},0)}
function doneSec(){return Object.keys(done).filter(function(k){return done[k]}).length}
function markDone(){done[aM+"-"+aS]=true;var mod=MODULES[aM];if(aS<mod.sections.length-1)aS++;else if(aM<MODULES.length-1){aM++;aS=0;}render();document.getElementById("ct").scrollTop=0;}
function goBack(){if(aS>0)aS--;else if(aM>0){aM--;aS=MODULES[aM].sections.length-1;}render();document.getElementById("ct").scrollTop=0;}
function goTo(mi,si){aM=mi;aS=si;render();document.getElementById("ct").scrollTop=0;if(window.innerWidth<700)toggleSidebar();}
function toggleSidebar(){sbOpen=!sbOpen;document.getElementById("sb").classList.toggle("closed",!sbOpen);}

function render(){
  var mod=MODULES[aM],sec=mod.sections[aS];
  var key=aM+"-"+aS,isDone=!!done[key],isFirst=aM===0&&aS===0,isLast=aM===MODULES.length-1&&aS===mod.sections.length-1;
  var ts=totSec(),ds=doneSec(),pct=Math.round(ds/ts*100);
  var rem=MODULES.slice(aM+1).reduce(function(a,m){return a+m.time},0)+Math.round(((mod.sections.length-aS)/mod.sections.length)*mod.time);
  document.getElementById("tb-sec").textContent=mod.icon+" "+mod.title+" - "+sec.title;
  document.getElementById("pg-lbl").textContent=ds+" / "+ts;
  document.getElementById("rng-n").textContent=pct+"%";
  document.getElementById("rng").style.strokeDashoffset=75.4-(75.4*pct/100);
  document.getElementById("sb-done").textContent=ds;
  document.getElementById("sb-left").textContent=rem;
  document.getElementById("sb-nav").innerHTML=MODULES.map(function(m,mi){
    var mA=mi===aM,mD=m.sections.every(function(_,si){return done[mi+"-"+si]});
    var secs=mA?"<div class=\"si-list\">"+m.sections.map(function(s,si){
      var sA=si===aS,sD=done[mi+"-"+si];
      return "<div class=\"si"+(sA?" on":"")+(sD?" done":"")+"\" onclick=\"event.stopPropagation();goTo("+mi+","+si+")\"><div class=\"si-dot"+(sD?" ok":sA?" cur":"")+"\">"+((sD)?"\u2713":"")+"</div><span class=\"si-lbl\">"+s.title+"</span></div>"
    }).join("")+"</div>":"";
    return "<div class=\"mi"+(mA?" on":"")+"\" onclick=\"goTo("+mi+",0)\"><div class=\"mi-hdr\"><div class=\"mi-ico\">"+m.icon+"</div><div class=\"mi-info\"><div class=\"mi-name\">"+m.title+"</div><div class=\"mi-meta\"><span class=\"mi-id\">"+m.id+"</span><span class=\"mi-t\">~"+m.time+"m</span></div></div><div class=\"mi-ck"+(mD?" ok":"")+"\">"+((mD)?"\u2713":"")+"</div></div>"+secs+"</div>"
  }).join("");
  var secPct=Math.round((aS+1)/mod.sections.length*100);
  var hasHist=chats[key]&&chats[key].length>0;
  var body="<div class=\"btext\">"+sec.content.split("\n\n").map(function(p){return "<p>"+p+"</p>"}).join("")+"</div>";
  if(sec.type==="critical") body+=renderDatasetCards(CRITICAL_DATASETS);
  if(sec.type==="supporting") body+=renderDatasetCards(SUPPORTING_DATASETS);
  if(sec.type==="systems") body+=renderSystems();
  if(sec.type==="checklist") body+=renderChecklist();
  if(sec.callout) body+=renderCO(sec.callout);
  if(sec.callout2) body+=renderCO(sec.callout2);
  document.getElementById("cti").innerHTML=
    "<div class=\"lhdr\"><div class=\"lcrumb\"><div class=\"lcrumb-ico\">"+mod.icon+"</div><span style=\"color:var(--royal);font-weight:600;font-family:var(--mono);font-size:11px\">"+mod.id+" - "+mod.title+"</span><span style=\"color:var(--muted)\">&#8250;</span><span style=\"font-size:11px;font-family:var(--mono);color:var(--muted)\">Section "+(aS+1)+" of "+mod.sections.length+"</span><span class=\"badge badge-platform\">PLATFORM</span></div>"+
    "<div class=\"ltitle\">"+sec.title+"</div>"+
    "<div class=\"lmeta\"><div class=\"lmi\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"10\"/><polyline points=\"12 6 12 12 16 14\"/></svg>~"+mod.time+" min</div>"+(isDone?"<div class=\"lmi\" style=\"color:var(--green)\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><polyline points=\"20 6 9 17 4 12\"/></svg>Completed</div>":"")+"</div>"+
    "<div class=\"lpbar\"><div class=\"lpfill\" style=\"width:"+secPct+"%\"></div></div></div>"+
    body+
    "<div class=\"fw\"><div class=\"fh\"><div class=\"fav-wrap\"><div class=\"fav\">&#127891;</div><div class=\"fon\"></div></div><div class=\"finfo\"><div class=\"fname\">Ask Finn</div><div class=\"fsub\">Platform Data Specialist</div></div><div class=\"fai\">AI TUTOR</div></div>"+
    "<div id=\"fmsgs\" class=\"fmsgs"+(hasHist?" vis":"")+"\"></div>"+
    (!hasHist?"<div id=\"fst\" class=\"fst\"><div class=\"fst-lbl\">Questions for this section</div><div class=\"fst-g\">"+mod.starters.map(function(q){return "<button class=\"fsbtn\" onclick=\"finnSend(this.textContent)\">"+q+"</button>"}).join("")+"</div></div>":"")+
    "<div class=\"fin\"><textarea id=\"fta\" class=\"fta\" placeholder=\"Ask Finn anything about data requirements...\" rows=\"1\" onkeydown=\"finnKey(event)\"></textarea><button class=\"fsnd\" onclick=\"finnSubmit()\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"white\"><polygon points=\"22 2 15 22 11 13 2 9 22 2\"/></svg></button></div></div>"+
    "<div class=\"lnav\"><button class=\"nbk\" onclick=\"goBack()\">"+(isFirst?" disabled":"")+"<svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><polyline points=\"15 18 9 12 15 6\"/></svg> Back</button>"+
    "<button class=\"nnx"+(isDone?" done":"")+"\" onclick=\"markDone()\">"+(isDone?"Done - Next":"Mark done")+" <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><polyline points=\"9 18 15 12 9 6\"/></svg></button></div>";
  if(hasHist){finnRender(key);document.getElementById("fmsgs").classList.add("vis");}
}
render();
</script>
</body>
</html>
