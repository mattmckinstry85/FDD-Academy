<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deal Glossary — PinpointAI Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#211847;--dark:#0F0D2A;--royal:#3D50F4;--royal2:#2E3FD0;
  --cyan:#35FFE9;--bg:#EEF0F8;--surface:#FFF;--card:#F5F6FC;--border:#E0E3F0;
  --text:#1A1835;--text2:#3A3D5C;--muted:#7E8587;--faint:#CDD0E8;
  --green:#0A7A4A;--red:#C8144A;--amber:#8A5500;--royal-bg:rgba(61,80,244,.06);
  --font:'Rubik',system-ui,sans-serif;--mono:'JetBrains Mono','Courier New',monospace;
  --r:8px;--rl:12px;--sh:0 1px 3px rgba(33,24,71,.07);
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-weight:300;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(33,24,71,.15);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .2s ease-out}

/* TOPBAR */
#tb{height:56px;display:flex;align-items:center;padding:0 24px;background:var(--navy);border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:100;gap:0}
.tb-logo{display:flex;align-items:center;gap:8px;padding-right:18px;border-right:1px solid rgba(255,255,255,.1);text-decoration:none;flex-shrink:0}
.tb-logo-box{width:28px;height:28px;background:var(--royal);border-radius:7px;display:flex;align-items:center;justify-content:center}
.tb-logo-box svg{width:15px;height:15px}
.tb-logo-name{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.3px}
.tb-logo-name b{color:var(--cyan)}
.tb-mid{flex:1;display:flex;align-items:center;padding:0 18px;gap:14px}
.tb-course{font-size:9px;font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3)}
.tb-sep{width:1px;height:16px;background:rgba(255,255,255,.1)}
.tb-title{font-size:13px;color:rgba(255,255,255,.7);font-weight:500}
.tb-back{display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);color:var(--dark);text-decoration:none;padding:6px 14px;border-radius:6px;background:var(--cyan);font-weight:700;transition:all .15s;flex-shrink:0}
.tb-back:hover{background:#20EDD6}

/* MAIN */
#main{max-width:900px;margin:0 auto;padding:40px 32px 80px}

/* HERO */
.hero{margin-bottom:32px}
.hero-eyebrow{font-size:10px;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;color:var(--royal);margin-bottom:8px;font-weight:600}
.hero-title{font-size:32px;font-weight:800;color:var(--text);letter-spacing:-.8px;margin-bottom:8px}
.hero-sub{font-size:15px;color:var(--muted);font-weight:300;line-height:1.6}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:28px}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted)}
.search-icon svg{width:16px;height:16px}
#search{width:100%;padding:13px 16px 13px 44px;border:1.5px solid var(--border);border-radius:var(--rl);font-size:15px;font-family:var(--font);font-weight:300;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s;box-shadow:var(--sh)}
#search:focus{border-color:var(--royal);background:var(--surface)}
#search::placeholder{color:var(--muted)}
#search-count{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:11px;font-family:var(--mono);color:var(--muted)}

/* ALPHA NAV */
.alpha-nav{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:28px}
.alpha-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-family:var(--mono);font-weight:600;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.alpha-btn:hover{border-color:var(--royal);color:var(--royal);background:var(--royal-bg)}
.alpha-btn.active{background:var(--royal);border-color:var(--royal);color:#fff}
.alpha-btn.empty{opacity:.3;cursor:default;pointer-events:none}

/* STATS */
.stats-row{display:flex;gap:20px;margin-bottom:32px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 18px;flex:1;box-shadow:var(--sh)}
.stat-val{font-size:24px;font-weight:800;font-family:var(--mono);color:var(--royal)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;font-weight:400}

/* LETTER SECTION */
.letter-section{margin-bottom:32px}
.letter-hdr{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--border)}
.letter{font-size:28px;font-weight:800;color:var(--royal);font-family:var(--mono);width:36px}
.letter-count{font-size:11px;font-family:var(--mono);color:var(--muted)}

/* TERM CARDS */
.terms-grid{display:flex;flex-direction:column;gap:8px}
.term-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px;box-shadow:var(--sh);transition:all .15s;cursor:pointer}
.term-card:hover{border-color:rgba(61,80,244,.25);box-shadow:0 4px 16px rgba(61,80,244,.08)}
.term-card.expanded{border-color:rgba(61,80,244,.3);background:var(--royal-bg)}
.term-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.term-name{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.term-short{font-size:13px;color:var(--muted);font-weight:300;margin-top:3px;line-height:1.5}
.term-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.term-tag{font-size:9px;font-family:var(--mono);padding:2px 7px;border-radius:10px;letter-spacing:.5px;font-weight:600;border:1px solid}
.tag-fdd{background:rgba(61,80,244,.08);color:var(--royal);border-color:rgba(61,80,244,.2)}
.tag-deal{background:rgba(10,122,74,.08);color:var(--green);border-color:rgba(10,122,74,.2)}
.tag-finance{background:rgba(138,85,0,.08);color:var(--amber);border-color:rgba(138,85,0,.2)}
.tag-legal{background:rgba(200,20,74,.08);color:var(--red);border-color:rgba(200,20,74,.2)}
.tag-pe{background:rgba(91,47,168,.08);color:#5B2FA8;border-color:rgba(91,47,168,.2)}
.term-expand{color:var(--muted);transition:transform .2s;flex-shrink:0}
.term-card.expanded .term-expand{transform:rotate(180deg)}
.term-detail{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:none}
.term-card.expanded .term-detail{display:block}
.term-full{font-size:14px;color:var(--text2);line-height:1.8;font-weight:300;margin-bottom:10px}
.term-example{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--text2);font-style:italic;line-height:1.6}
.term-example-lbl{font-size:9px;font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;color:var(--royal);margin-bottom:5px;font-weight:600;font-style:normal}

/* NO RESULTS */
#no-results{display:none;text-align:center;padding:60px 20px;color:var(--muted)}
#no-results svg{width:40px;height:40px;margin:0 auto 12px;opacity:.3}
#no-results p{font-size:15px}

@media(max-width:600px){
  #main{padding:24px 16px 60px}
  .stats-row{grid-template-columns:1fr 1fr;display:grid}
  .hero-title{font-size:24px}
}
</style>
</head>

<div id="main">
  <div class="hero">
    <div class="hero-eyebrow">Reference</div>
    <h1 class="hero-title">Deal Glossary</h1>
    <p class="hero-sub">Every term you will hear in M&A and FDD conversations. Click any term to see the full definition and a plain English example.</p>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-val" id="total-count">0</div><div class="stat-lbl">Terms defined</div></div>
    <div class="stat"><div class="stat-val" id="results-count">0</div><div class="stat-lbl">Showing</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--cyan)">A-Z</div><div class="stat-lbl">Fully indexed</div></div>
  </div>

  <div class="search-wrap">
    <div class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
    <input id="search" type="text" placeholder="Search terms, e.g. EBITDA, locked box, working capital..." autocomplete="off">
    <span id="search-count"></span>
  </div>

  <div class="alpha-nav" id="alpha-nav"></div>

  <div id="glossary"></div>
  <div id="no-results">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <p>No terms found for that search.</p>
  </div>
</div>

<script>
const TERMS = [
  // A
  {term:"Addback",letter:"A",short:"A cost added back to EBITDA to normalise profit",tags:["fdd"],
   full:"An addback is an adjustment made to reported EBITDA to remove costs that are considered non-recurring or not representative of the ongoing business. Common addbacks include one-off legal costs, above-market director salaries, and restructuring charges. Each addback must be evidenced and justified.",
   example:"The seller proposed a £45,000 addback for IP litigation costs. The FDD team accepted it conditionally, pending receipt of the full legal file confirming the matter was resolved."},

  {term:"ACA / ACCA",letter:"A",short:"UK accountancy qualifications held by most FDD professionals",tags:["finance"],
   full:"ACA is the qualification awarded by the Institute of Chartered Accountants in England and Wales (ICAEW). ACCA is the Association of Chartered Certified Accountants. Both are standard qualifications for professionals working in transaction services and FDD. In the US and Canada, the equivalent is CPA.",
   example:"Most Managers and Senior Managers in a UK transaction services team will hold ACA or ACCA. It is usually a prerequisite for promotion above Analyst level."},

  {term:"Adjusted EBITDA",letter:"A",short:"EBITDA after normalisation adjustments",tags:["fdd","finance"],
   full:"Adjusted EBITDA is the reported EBITDA figure after applying addbacks and deductions to reflect the true recurring earnings of the business. This is the number used to value the business in an acquisition. It should represent what the business would earn in a normalised year going forward.",
   example:"FieldForce reported EBITDA of £636k. After applying normalisation adjustments the adjusted EBITDA was £740k, which was used to calculate the enterprise value."},

  {term:"ARR",letter:"A",short:"Annual Recurring Revenue — contracted revenue expected to recur each year",tags:["finance","deal"],
   full:"Annual Recurring Revenue is the value of contracted, recurring revenue normalised to a twelve-month period. It is the primary valuation metric for SaaS businesses. ARR excludes one-off fees, professional services, and hardware sales — only contracted subscription revenue counts.",
   example:"FieldForce's ARR at December 2023 was approximately £1.92m — the total value of its contracted SaaS licence agreements annualised."},

  {term:"Asset Deal",letter:"A",short:"Acquisition of specific assets rather than company shares",tags:["deal","legal"],
   full:"In an asset deal, the buyer acquires specific assets and liabilities of the target business rather than the shares of the company. This is the alternative to a share deal. Asset deals allow the buyer to select which assets and liabilities to take on, avoiding unwanted historic liabilities.",
   example:"Rather than buying the whole company, the buyer structured the deal as an asset purchase, acquiring only the software IP and customer contracts, leaving historic tax liabilities with the seller."},

  // B
  {term:"Balance Sheet",letter:"B",short:"Financial statement showing what a business owns and owes at a point in time",tags:["finance"],
   full:"The balance sheet is a snapshot of a company's financial position at a specific date. It shows assets (what the business owns or is owed), liabilities (what it owes to others), and equity (the residual value belonging to shareholders). Assets must always equal liabilities plus equity.",
   example:"The December 2023 balance sheet showed trade debtors of £298k and deferred revenue of £196k — both key inputs to the working capital calculation."},

  {term:"Bolt-on Acquisition",letter:"B",short:"An acquisition made by a PE-backed business to add scale",tags:["deal","pe"],
   full:"A bolt-on is an acquisition made by a company that is already owned by private equity, with the intention of adding to its existing business. Bolt-ons are smaller than the original acquisition and are used to add revenue, customers, geography, or capability. They follow the same FDD process as any acquisition.",
   example:"After acquiring a facilities management software business in 2022, the PE fund made three bolt-on acquisitions in 2023 to expand the customer base into the construction sector."},

  {term:"Bridge",letter:"B",short:"A table walking from one financial figure to another through adjustments",tags:["fdd"],
   full:"A bridge in FDD context is a table that shows how you get from one number to another through a series of defined adjustments. The most common is the EBITDA bridge, which walks from reported EBITDA to adjusted EBITDA. Bridges are a core output of any FDD report.",
   example:"The EBITDA bridge started at £636k reported, added back £80k for above-market director salary, added £45k for one-off legal costs, and deducted £35k for a structural vacancy, arriving at £740k adjusted EBITDA."},

  {term:"Buy-side",letter:"B",short:"Working for the buyer in an M&A transaction",tags:["deal"],
   full:"Buy-side refers to work done on behalf of the acquirer in a transaction. Buy-side FDD means the acquiring party has appointed your firm to verify the target's financials before completing the deal. This is the most common type of FDD engagement.",
   example:"The private equity fund appointed a mid-tier accounting firm to run buy-side FDD on the target, covering quality of earnings, working capital, and net debt."},

  // C
  {term:"Capex",letter:"C",short:"Capital expenditure — money spent on long-term assets",tags:["finance","fdd"],
   full:"Capital expenditure is spending on assets that will be used over multiple years — equipment, software, leasehold improvements, vehicles. Unlike operating expenses, capex is not expensed immediately but depreciated over the asset's useful life. In FDD, understanding the capex requirement is important because deferred capex inflates EBITDA.",
   example:"FieldForce capitalised £97k of development costs in 2023. The FDD team reviewed the capitalisation policy to ensure this was consistent with prior years and not inflating EBITDA."},

  {term:"Completion Accounts",letter:"C",short:"A mechanism to adjust the deal price based on actual financials at closing",tags:["deal","legal"],
   full:"Completion accounts is a price adjustment mechanism where the final consideration paid is adjusted after the deal closes, based on the actual balance sheet at the completion date. Net debt and working capital are measured and compared to agreed targets. If debt is higher than expected, the price falls; if working capital is below the peg, the price falls.",
   example:"The parties agreed to a completion accounts mechanism. At closing, net debt was £240k vs the target of £219k — the buyer received a £21k price reduction."},

  {term:"CPA",letter:"C",short:"Certified Public Accountant — US and Canadian equivalent of ACA/ACCA",tags:["finance"],
   full:"CPA is the standard professional accounting qualification in the United States and Canada. It is the equivalent of the UK's ACA or ACCA. Most FDD professionals at US and Canadian firms will hold a CPA qualification.",
   example:"The Senior Manager at the New York boutique held a CPA and had spent eight years running QoE engagements for PE clients across the mid-market."},

  {term:"Customer Concentration",letter:"C",short:"The degree to which revenue is dependent on a small number of customers",tags:["fdd","deal"],
   full:"Customer concentration risk arises when a significant proportion of revenue comes from a small number of customers. If the top customer represents 40% of revenue and that relationship is lost post-acquisition, the business is materially impaired. FDD teams always analyse revenue by customer and flag concentration above certain thresholds.",
   example:"FieldForce's largest customer, Meridian FM, represented 11% of 2023 revenue. Manageable individually, but the FDD team noted that David Kavanagh personally managed that relationship — linking customer concentration to key person risk."},

  // D
  {term:"Data Room",letter:"D",short:"A secure online folder where the seller deposits documents for buyer review",tags:["deal","fdd"],
   full:"A data room is a secure, password-protected online repository used in M&A transactions to share confidential documents with potential buyers and their advisors. It contains financial statements, contracts, payroll data, legal documents, and other materials needed for due diligence. Access is controlled by the seller.",
   example:"The data room was opened on 3 January. The FDD team logged in and immediately noted that management accounts for Q3 2023 were missing — a gap that was flagged to the client."},

  {term:"Deferred Revenue",letter:"D",short:"Cash received for services not yet delivered — a current liability",tags:["finance","fdd"],
   full:"Deferred revenue arises when a business receives payment before it has delivered the service or product. It sits as a current liability on the balance sheet because the business owes the customer the service. In SaaS businesses, annual licence fees billed upfront create significant deferred revenue. It is released to the P&L as the service is delivered.",
   example:"FieldForce's deferred revenue grew from £148k to £196k between 2022 and 2023 — reflecting the growth in contracted ARR and the timing of December renewals."},

  {term:"Debt-like Item",letter:"D",short:"A liability that is not formal debt but should still reduce the deal price",tags:["fdd","deal"],
   full:"Debt-like items are obligations that will require a cash outflow after completion but are not classified as financial debt on the balance sheet. Common examples include HMRC arrears, pension deficits, deferred tax liabilities, unfunded holiday pay, and COVID-era tax deferrals. They reduce the equity consideration pound for pound.",
   example:"The FDD team identified a £28k VAT deferral from the HMRC COVID scheme that was not in the seller's own debt schedule. This was treated as a debt-like item and deducted from the equity price."},

  {term:"Director Loan Account",letter:"D",short:"Money owed by the company to its director — must be repaid at completion",tags:["fdd","deal"],
   full:"A director loan account is a balance owed by the company to one of its directors. It arises when a director lends money to the business or when expenses and dividends are processed through a loan account. Director loan accounts must be repaid at or before completion and should always be included in the net debt calculation.",
   example:"The FieldForce FDD team found a £45k director loan account in the balance sheet notes that had not been included in the seller's own debt schedule — a critical finding that reduced the equity price."},

  {term:"Due Diligence",letter:"D",short:"The process of independently verifying information before completing a transaction",tags:["deal","fdd"],
   full:"Due diligence is the comprehensive appraisal of a business undertaken by a prospective buyer before an acquisition. It covers financial (FDD), legal, commercial, tax, and operational workstreams. The purpose is to verify the seller's claims and identify risks before the buyer commits to the transaction.",
   example:"The buyer ran a four-week due diligence process, with FDD, legal, and commercial workstreams running in parallel."},

  // E
  {term:"Earn-out",letter:"E",short:"A portion of deal consideration paid after completion based on future performance",tags:["deal","legal"],
   full:"An earn-out is a mechanism where part of the purchase price is deferred and paid only if the business hits specified targets after completion — typically revenue or EBITDA targets over one to three years. Earn-outs are used to bridge valuation gaps and align the seller's interests with post-completion performance.",
   example:"Given the key person risk around David Kavanagh, the buyer structured £500k of the consideration as an earn-out payable over two years, conditional on David remaining with the business and hitting EBITDA targets."},

  {term:"EBITDA",letter:"E",short:"Earnings Before Interest, Tax, Depreciation and Amortisation",tags:["fdd","finance"],
   full:"EBITDA is the primary profitability metric used in M&A. It measures operating profit before financing costs (interest), tax, and non-cash accounting charges (depreciation and amortisation). It is used as a proxy for cash generation from operations and is the basis for valuation multiples.",
   example:"FieldForce's reported EBITDA for 2023 was £636k, representing a 22% EBITDA margin on revenue of £2.84m."},

  {term:"EBITDA Margin",letter:"E",short:"EBITDA as a percentage of revenue",tags:["fdd","finance"],
   full:"EBITDA margin is calculated by dividing EBITDA by revenue and expressing it as a percentage. It measures how efficiently the business converts revenue into operating profit. Higher margins indicate a more scalable business model. Margins vary significantly by sector.",
   example:"FieldForce's EBITDA margin expanded from 17% in 2021 to 22% in 2023 — a positive trend suggesting operational leverage as the business scaled."},

  {term:"Enterprise Value",letter:"E",short:"The total value of a business, before adjusting for debt and cash",tags:["deal","finance"],
   full:"Enterprise Value (EV) is the theoretical total value of a business — what you would pay to buy the entire business, including its debt obligations. It is calculated as equity value plus net debt. In practice, M&A valuations are expressed as Enterprise Value and then adjusted for actual debt and cash to arrive at the equity consideration.",
   example:"FieldForce was valued at an enterprise value of £3.77m (5x adjusted EBITDA of £740k). After deducting net debt of £219k and debt-like items of £28k, the implied equity value was approximately £3.5m."},

  {term:"Equity Value",letter:"E",short:"What the buyer actually pays for the shares",tags:["deal","finance"],
   full:"Equity value is the price paid for the shares of the business. It is derived from the enterprise value by deducting net debt and adding excess cash. It also adjusts for any working capital shortfall or surplus versus the agreed peg. This is the number that gets wired to the seller at completion.",
   example:"EV of £3.77m less net debt (£219k) less VAT deferral (£28k) less WC shortfall (£18k) = implied equity value of approximately £3.5m."},

  {term:"Exclusivity",letter:"E",short:"A period where the seller agrees to negotiate only with one buyer",tags:["deal"],
   full:"Exclusivity is a period, usually 4-8 weeks, during which the seller agrees not to negotiate with other potential buyers. It is granted after a preferred bidder is selected and allows the buyer to conduct due diligence with confidence that the deal will not be taken by a competitor.",
   example:"The seller granted four weeks of exclusivity to the PE fund on 15 January. The FDD team was instructed to complete their report before the exclusivity period expired."},

  // F
  {term:"FDD",letter:"F",short:"Financial Due Diligence — the financial verification process in an M&A transaction",tags:["fdd"],
   full:"Financial Due Diligence is the process of independently verifying a target company's financial position, performance, and prospects before an acquisition. It covers quality of earnings, working capital, net debt, and financial reporting quality. The output is an FDD report that the buyer uses to finalise the deal price and structure.",
   example:"The buyer appointed a Big 4 firm to run FDD on the target. The FDD report identified a £45k director loan account and a working capital peg dispute that together reduced the agreed equity price by £85k."},

  {term:"Fixed Assets",letter:"F",short:"Long-term assets owned by the business",tags:["finance"],
   full:"Fixed assets (also called non-current assets) are assets held for long-term use in the business rather than for sale. They include tangible assets such as equipment and vehicles, and intangible assets such as capitalised software development costs and intellectual property. Fixed assets are depreciated or amortised over their useful lives.",
   example:"FieldForce's fixed assets at December 2023 included £148k of tangible assets (computers and office equipment) and £220k of capitalised development costs."},

  // G
  {term:"Gross Margin",letter:"G",short:"Gross profit as a percentage of revenue",tags:["fdd","finance"],
   full:"Gross margin is calculated by dividing gross profit by revenue and expressing as a percentage. It measures how much of each pound of revenue the business keeps after paying the direct costs of delivery. Gross margin varies significantly by sector — SaaS businesses typically achieve 70-85%, while manufacturing businesses may achieve 30-50%.",
   example:"FieldForce's gross margin was 76% in 2023, consistent with its SaaS model. The FDD team compared this to prior years (74% in both 2021 and 2022) to assess whether the improvement was structural."},

  {term:"Gross Profit",letter:"G",short:"Revenue minus the direct costs of delivering the product or service",tags:["finance"],
   full:"Gross profit is revenue minus cost of sales (the direct costs of delivering the product or service). It is the first profitability measure on the P&L and shows how much the business earns before paying its fixed overheads. Operating expenses such as staff, rent, and marketing are deducted below the gross profit line.",
   example:"FieldForce's gross profit in 2023 was £2.16m (revenue of £2.84m minus cost of sales of £680k), representing a 76% gross margin."},

  // H
  {term:"Hold Period",letter:"H",short:"The period a PE fund holds an investment before selling",tags:["pe","deal"],
   full:"The hold period is the length of time a private equity fund owns a business between acquisition and exit. Typical PE hold periods are three to seven years. During the hold period, the fund works to grow the business, often through organic growth and bolt-on acquisitions, before selling at a higher valuation.",
   example:"The PE fund acquired the business in 2019 and sold it in 2024 — a five-year hold period. During that time they made two bolt-on acquisitions and grew EBITDA from £2m to £5m."},

  // I
  {term:"IM",letter:"I",short:"Information Memorandum — the seller's marketing document",tags:["deal"],
   full:"The Information Memorandum (IM) is a detailed document prepared by the seller's advisors to present the business to potential buyers. It covers the business model, financial performance, market position, growth strategy, and management team. The IM presents the business in the most favourable light — it is the starting point for FDD, not the end.",
   example:"The IM claimed adjusted EBITDA of £780k. The FDD team's own analysis arrived at £740k after rejecting part of the rebrand addback and applying a buyer-side deduction for the sales vacancy."},

  {term:"IRL",letter:"I",short:"Information Request List — the formal list of documents requested from the seller",tags:["fdd"],
   full:"The Information Request List is the document sent to the seller at the start of due diligence setting out all the information and documents required. A well-constructed IRL is specific, organised by workstream, and tailored to the scope of the engagement. Gaps in the IRL response are tracked and escalated.",
   example:"The FDD team sent a 45-item IRL on day one of exclusivity. By day five, 12 items remained outstanding including the management accounts for Q3 2023 and all loan agreements."},

  // L
  {term:"Locked Box",letter:"L",short:"A price mechanism where the deal price is fixed at a historical date",tags:["deal","legal"],
   full:"A locked box is an alternative to completion accounts as a price mechanism. The price is fixed by reference to a historical balance sheet date (the locked box date). From that date, no value can leak from the business to the seller. The buyer takes economic risk from the locked box date but avoids the uncertainty of a completion accounts adjustment.",
   example:"The parties agreed a locked box mechanism with a reference date of 30 September 2023. The seller warranted that no value had leaked from the business since that date."},

  {term:"LTM",letter:"L",short:"Last Twelve Months — a rolling twelve-month financial period",tags:["fdd","finance"],
   full:"LTM (Last Twelve Months) is a rolling period of the most recent twelve months of financial performance. It is used to give a more current view of the business than the last full financial year. LTM EBITDA is calculated by taking the last full year, adding the most recent period, and subtracting the equivalent period from the prior year.",
   example:"FieldForce's last financial year ended December 2023. The FDD team calculated LTM EBITDA to June 2024 to assess current trading and whether the growth trend was continuing."},

  // M
  {term:"Management Accounts",letter:"M",short:"Internal monthly financial reports produced by management",tags:["fdd","finance"],
   full:"Management accounts are internal financial reports produced by the business, typically monthly. They include P&L, balance sheet, and sometimes cashflow. They are more detailed and current than statutory accounts but are unaudited. In FDD, management accounts are the primary source of financial data.",
   example:"The FDD team requested monthly management accounts for the 36 months ended December 2023. On day two of the data room, accounts for August and September 2023 were still missing."},

  {term:"MBO",letter:"M",short:"Management Buy-Out — acquisition of a business by its own management team",tags:["deal","pe"],
   full:"A Management Buy-Out (MBO) is a transaction where the existing management team acquires the business, typically backed by private equity. The management team usually contributes a small portion of equity and the PE fund provides the majority of financing. FDD is still required — the PE fund needs independent verification of the financials.",
   example:"The founders of the software business decided to retire and sold to the senior management team in an MBO backed by a mid-market PE fund."},

  // N
  {term:"Net Debt",letter:"N",short:"Total financial borrowings minus cash held by the business",tags:["fdd","deal","finance"],
   full:"Net debt is calculated as total financial debt minus cash at bank. It is deducted from enterprise value to arrive at equity value, reducing the price pound for pound. Financial debt includes bank loans, finance leases, hire purchase agreements, and director loan accounts.",
   example:"FieldForce's net debt at December 2023 was £219k — comprising an HSBC term loan (£220k), a finance lease (£38k), and a director loan account (£45k), less cash of £84k."},

  {term:"NDA",letter:"N",short:"Non-Disclosure Agreement — a confidentiality agreement signed before receiving deal information",tags:["deal","legal"],
   full:"A Non-Disclosure Agreement is a contract signed by potential buyers before receiving confidential information about the target business. It prevents them from sharing or using that information for any purpose other than evaluating the acquisition. Signing an NDA is typically the first step in any M&A process.",
   example:"Before receiving the Information Memorandum, all interested parties were required to sign the seller's standard NDA. The process coordinator provided the NDA via the data room platform."},

  {term:"Normalisation",letter:"N",short:"The process of adjusting reported figures to reflect underlying performance",tags:["fdd"],
   full:"Normalisation is the process of adjusting reported financials to remove items that are non-recurring, one-off, or not representative of the ongoing business. In FDD, normalisation produces the adjusted EBITDA — the number used to value the business. Normalisation adjustments can be addbacks (increasing EBITDA) or deductions (reducing it).",
   example:"The FDD team normalised the 2023 P&L by adding back the one-off legal costs (£45k) and above-market director salary (£80k), and deducting the structural sales vacancy cost (£35k)."},

  // P
  {term:"P&L",letter:"P",short:"Profit and Loss statement — summary of revenue and costs over a period",tags:["finance","fdd"],
   full:"The Profit and Loss statement (also called the Income Statement) records all revenue earned and all costs incurred during a period. It flows top to bottom: Revenue → Gross Profit → EBITDA → PBT → PAT. It is one of the three core financial statements alongside the balance sheet and cashflow statement.",
   example:"The FDD team reviewed the monthly P&L for each of the 36 months ended December 2023, noting the unusual spike in marketing costs in April 2023 that was later explained as the website rebrand."},

  {term:"PBT",letter:"P",short:"Profit Before Tax",tags:["finance"],
   full:"Profit Before Tax is the profit remaining after all operating costs, depreciation, and interest charges, but before corporation tax. It is the figure taxed by HMRC. In FDD, PBT is less commonly used than EBITDA because it includes financing and accounting charges that vary between businesses.",
   example:"FieldForce's PBT for 2023 was £576k — EBITDA of £636k less depreciation of £42k and interest of £18k."},

  {term:"PE",letter:"P",short:"Private Equity — funds that acquire and grow private businesses",tags:["pe","deal"],
   full:"Private equity firms raise funds from institutional investors and use them to acquire businesses, grow them, and sell them at a profit. They are the primary commissioners of buy-side FDD. Understanding how PE funds think and what they need from an FDD report is essential context for anyone working in transaction services.",
   example:"The PE fund had a five-year investment horizon and was targeting businesses with EBITDA of £500k-£5m in the business services sector. They ran FDD on every acquisition regardless of size."},

  {term:"Peg",letter:"P",short:"The target working capital level agreed as part of the deal price",tags:["fdd","deal"],
   full:"The working capital peg is the target level of working capital that the seller must deliver at completion. If actual working capital at completion is above the peg, the buyer pays more. If it is below, they pay less. The peg is typically set at the 12-month average working capital to reflect normal trading conditions.",
   example:"The FDD team recommended a working capital peg of (£22k), representing the 12-month average. The seller proposed (£10k), based on the September month-end — the lowest point in the year."},

  {term:"Post-completion",letter:"P",short:"The period after the deal closes",tags:["deal"],
   full:"Post-completion refers to the period after the sale has legally completed — shares have transferred and consideration has been paid. In a completion accounts deal, the final price adjustment is determined post-completion based on the actual balance sheet. Earn-out payments are also made post-completion if targets are hit.",
   example:"Six weeks after completion, the seller submitted their version of the completion accounts. The buyer's FDD team reviewed them and raised a dispute over the working capital calculation."},

  // Q
  {term:"QoE",letter:"Q",short:"Quality of Earnings — US/Canadian term for what the UK calls FDD",tags:["fdd"],
   full:"Quality of Earnings is the dominant term for financial due diligence in the United States and Canada. It covers the same analytical work as FDD — normalising EBITDA, assessing revenue quality, and reviewing the cost base. In the UK, FDD is the standard term. When speaking to US or Canadian firms, lead with QoE.",
   example:"The New York boutique specialised in QoE analysis for mid-market PE transactions. Their team of 30 ran approximately 80 QoE engagements per year across North America."},

  // R
  {term:"Recurring Revenue",letter:"R",short:"Revenue that repeats automatically without requiring new sales activity",tags:["fdd","finance"],
   full:"Recurring revenue is revenue that is expected to recur in future periods without the need to win new customers or new contracts. Contracted recurring revenue — such as annual SaaS subscriptions — is the most valuable form. It provides visibility, reduces revenue risk, and supports higher valuation multiples.",
   example:"68% of FieldForce's 2023 revenue was contracted recurring SaaS licences. The FDD team assessed this as high quality, noting the auto-renewal provisions in standard contracts."},

  {term:"Run-rate",letter:"R",short:"An annualised estimate based on current trading",tags:["fdd","finance"],
   full:"Run-rate is the annualisation of a recent period's performance to estimate full-year results. It is used when the most recent period is more representative of current trading than the last full financial year. In a growing business, the run-rate EBITDA will be higher than the prior year figure.",
   example:"The business's LTM EBITDA to March 2024 was £820k — a run-rate that was materially higher than the 2023 full year figure of £636k, suggesting continued growth."},

  // S
  {term:"Sell-side",letter:"S",short:"Working for the seller in an M&A transaction",tags:["deal"],
   full:"Sell-side refers to work done on behalf of the business being sold. Sell-side FDD (also called vendor due diligence or VDD) is prepared by the seller's advisors before going to market. It gives potential buyers a pre-prepared set of financial findings and speeds up the buy-side diligence process.",
   example:"The seller appointed a mid-tier firm to run sell-side FDD before launching the formal sale process. This gave bidders confidence in the numbers and allowed the process to move faster."},

  {term:"SPA",letter:"S",short:"Sale and Purchase Agreement — the legal contract for the acquisition",tags:["deal","legal"],
   full:"The Sale and Purchase Agreement is the definitive legal contract governing the acquisition. It sets out the price, the price adjustment mechanism, the warranties given by the seller, any indemnities, and the conditions to completion. FDD findings inform the warranties and indemnities negotiated in the SPA.",
   example:"The SPA included a specific indemnity for the outstanding VAT deferral identified in FDD, protecting the buyer against any additional HMRC liability arising from the COVID deferral arrangement."},

  {term:"Statutory Accounts",letter:"S",short:"Formally filed annual accounts, often audited",tags:["finance","fdd"],
   full:"Statutory accounts are the annual financial statements prepared in accordance with UK GAAP or IFRS and filed at Companies House. For larger companies they are audited. They are less detailed than management accounts but are verified externally. FDD teams always cross-reference management accounts to statutory accounts.",
   example:"The FDD team compared the 2022 management accounts to the filed statutory accounts and found an unexplained £42k difference in revenue — a discrepancy that required explanation from management."},

  // T
  {term:"Transaction Services",letter:"T",short:"The practice within an accounting firm that runs FDD and M&A advisory",tags:["fdd","deal"],
   full:"Transaction Services (TS) is the name used by most large accounting firms for their M&A advisory and FDD practice. It typically encompasses financial due diligence, quality of earnings, working capital analysis, and sometimes valuations and modelling. When looking at someone's LinkedIn profile, Transaction Services means they run FDD work.",
   example:"The Senior Manager had spent six years in the Transaction Services team at a Big 4 firm, running buy-side and sell-side FDD engagements for PE and corporate clients."},

  // V
  {term:"VDD",letter:"V",short:"Vendor Due Diligence — FDD prepared by the seller before going to market",tags:["fdd","deal"],
   full:"Vendor Due Diligence is a form of FDD commissioned by the seller and presented to potential buyers. It provides buyers with pre-prepared financial analysis of the business, reducing the time needed for buy-side diligence. VDD reports are typically prepared alongside the Information Memorandum.",
   example:"The seller's advisors prepared a VDD report covering three years of financial performance. The buy-side FDD team reviewed it critically and ran their own analysis to verify the key findings."},

  // W
  {term:"Warranty",letter:"W",short:"A contractual statement made by the seller about the business",tags:["deal","legal"],
   full:"Warranties are statements of fact made by the seller in the SPA — for example, that the accounts are accurate, that there are no undisclosed liabilities, or that no key customers have given notice. If a warranty is breached after completion, the buyer can claim damages from the seller. FDD findings inform which warranties the buyer pushes for.",
   example:"The buyer insisted on a specific warranty that no material customers had given notice to terminate as of the completion date, following the discovery that Orion Building Services had churned in Q3 2023."},

  {term:"Working Capital",letter:"W",short:"The cash tied up in running the business day to day",tags:["fdd","finance"],
   full:"Working capital is calculated as current assets minus current liabilities. It represents the short-term liquidity available to the business. In FDD, working capital analysis determines the peg — the target level of working capital the seller must deliver at completion. A working capital shortfall reduces the equity price.",
   example:"FieldForce's working capital was consistently negative (ranging from £14k to £30k) due to its SaaS billing model, where customers pay annual fees upfront creating a deferred revenue liability."},

  // Z
  {term:"Zero-based Budget",letter:"Z",short:"A budget built from scratch each year rather than based on prior year",tags:["finance"],
   full:"A zero-based budget requires every cost to be justified from the ground up each year, rather than taking prior year spend as the starting point and adjusting. It is relevant in FDD when assessing whether a business's cost base is genuinely lean or whether historic inefficiencies have been carried forward.",
   example:"The management team explained that they ran a zero-based budgeting process each year, which helped explain why the cost base had remained disciplined despite rapid revenue growth."}
];

// Build letter index
const letterIndex = {};
TERMS.forEach(t => {
  if (!letterIndex[t.letter]) letterIndex[t.letter] = [];
  letterIndex[t.letter].push(t);
});
const allLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

// Update stats
document.getElementById('total-count').textContent = TERMS.length;
document.getElementById('results-count').textContent = TERMS.length;

// Build alpha nav
const alphaNav = document.getElementById('alpha-nav');
allLetters.forEach(l => {
  const btn = document.createElement('button');
  btn.className = 'alpha-btn' + (letterIndex[l] ? '' : ' empty');
  btn.textContent = l;
  btn.onclick = () => {
    document.getElementById('section-' + l)?.scrollIntoView({behavior:'smooth', block:'start'});
    document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  };
  alphaNav.appendChild(btn);
});

function renderGlossary(terms) {
  const glossaryEl = document.getElementById('glossary');
  
  // Group by letter
  const grouped = {};
  terms.forEach(t => {
    if (!grouped[t.letter]) grouped[t.letter] = [];
    grouped[t.letter].push(t);
  });

  glossaryEl.innerHTML = Object.keys(grouped).sort().map(letter => `
    <div class="letter-section fu" id="section-${letter}">
      <div class="letter-hdr">
        <div class="letter">${letter}</div>
        <div class="letter-count">${grouped[letter].length} term${grouped[letter].length > 1 ? 's' : ''}</div>
      </div>
      <div class="terms-grid">
        ${grouped[letter].map(t => `
          <div class="term-card" onclick="toggleTerm(this)">
            <div class="term-top">
              <div>
                <div class="term-name">${t.term}</div>
                <div class="term-short">${t.short}</div>
                <div class="term-tags">${t.tags.map(tag => `<span class="term-tag tag-${tag}">${tag.toUpperCase()}</span>`).join('')}</div>
              </div>
              <svg class="term-expand" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="term-detail">
              <div class="term-full">${t.full}</div>
              <div class="term-example">
                <div class="term-example-lbl">Example in context</div>
                ${t.example}
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  document.getElementById('results-count').textContent = terms.length;
  document.getElementById('no-results').style.display = terms.length === 0 ? 'block' : 'none';
}

function toggleTerm(card) {
  const wasExpanded = card.classList.contains('expanded');
  document.querySelectorAll('.term-card.expanded').forEach(c => c.classList.remove('expanded'));
  if (!wasExpanded) card.classList.add('expanded');
}

// Search
const searchEl = document.getElementById('search');
searchEl.addEventListener('input', () => {
  const q = searchEl.value.toLowerCase().trim();
  if (!q) {
    renderGlossary(TERMS);
    document.getElementById('search-count').textContent = '';
    return;
  }
  const filtered = TERMS.filter(t =>
    t.term.toLowerCase().includes(q) ||
    t.short.toLowerCase().includes(q) ||
    t.full.toLowerCase().includes(q) ||
    t.tags.some(tag => tag.includes(q))
  );
  renderGlossary(filtered);
  document.getElementById('search-count').textContent = filtered.length + ' results';
});

renderGlossary(TERMS);
</script>
</body>
</html>
