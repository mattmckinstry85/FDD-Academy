      (m.role==='assistant'?'<div class="mav f">F</div>':'')+
      '<div class="mb '+(m.role==='assistant'?'f':'u')+'">'+m.content.replace(/\n/g,'<br>')+'</div>'+
      (m.role==='user'?'<div class="mav y">M</div>':'')+
    '</div>'
  }).join('');
  div.scrollTop=div.scrollHeight;
}

function finnKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();finnSubmit();}
  var ta=document.getElementById('fta');
  if(ta){ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,100)+'px';}
}

function finnSubmit(){
  var ta=document.getElementById('fta');
  var q=ta?ta.value.trim():'';if(!q)return;
  ta.value='';ta.style.height='auto';finnSend(q);
}

// NAV
function totSec(){return MODULES.reduce(function(a,m){return a+m.sections.length},0)}
function doneSec(){return Object.keys(done).filter(function(k){return done[k]}).length}

function markDone(){ if(typeof stopSpeech==="function") stopSpeech(); stopSpeech();
  done[aM+'-'+aS]=true;
  var mod=MODULES[aM];
  if(aS<mod.sections.length-1) aS++;
  else if(aM<MODULES.length-1){aM++;aS=0;}
  render();document.getElementById('ct').scrollTop=0;
}
function goBack(){ if(typeof stopSpeech==="function") stopSpeech();
  if(aS>0) aS--;
  else if(aM>0){aM--;aS=MODULES[aM].sections.length-1;}
  render();document.getElementById('ct').scrollTop=0;
}
function goTo(mi,si){ if(typeof stopSpeech==="function") stopSpeech();aM=mi;aS=si;render();document.getElementById('ct').scrollTop=0;if(window.innerWidth<700)toggleSidebar();}
function toggleSidebar(){sbOpen=!sbOpen;document.getElementById('sb').classList.toggle('closed',!sbOpen);}

// RENDER
function render(){
  var mod=MODULES[aM],sec=mod.sections[aS];
  var key=aM+'-'+aS;
  var isDone=!!done[key];
  var isFirst=aM===0&&aS===0;
  var isLast=aM===MODULES.length-1&&aS===mod.sections.length-1;
  var ts=totSec(),ds=doneSec();
  var pct=Math.round(ds/ts*100);
  var rem=MODULES.slice(aM+1).reduce(function(a,m){return a+m.time},0)+Math.round(((mod.sections.length-aS)/mod.sections.length)*mod.time);

  document.getElementById('tb-sec').textContent=mod.icon+' '+mod.title+' - '+sec.title;
  document.getElementById('pg-lbl').textContent=ds+' / '+ts;
  document.getElementById('pg-sub').textContent='~'+rem+' min';
  document.getElementById('rng-n').textContent=pct+'%';
  document.getElementById('rng').style.strokeDashoffset=81.68-(81.68*pct/100);
  document.getElementById('sb-done').textContent=ds;
  document.getElementById('sb-left').textContent=rem;

  // Sidebar
  document.getElementById('sb-nav').innerHTML=MODULES.map(function(m,mi){
    var mA=mi===aM;
    var mD=m.sections.every(function(_,si){return done[mi+'-'+si]});
    var foundBadge=m.tag==='foundation'?'<span style="font-size:9px;font-family:var(--mono);color:rgba(91,47,168,.8);background:rgba(91,47,168,.12);padding:1px 5px;border-radius:10px;font-weight:600">FOUND</span>':'';
    var secs=mA?'<div class="si-list">'+m.sections.map(function(s,si){
      var sA=si===aS,sD=done[mi+'-'+si];
      return '<div class="si'+(sA?' on':'')+(sD?' done':'')+'" onclick="event.stopPropagation();goTo('+mi+','+si+')">'+
        '<div class="si-dot'+(sD?' ok':sA?' cur':'')+'">'+((sD)?'&#10003;':'')+'</div>'+
        '<span class="si-lbl">'+s.title+'</span></div>'
    }).join('')+'</div>':'';
    return '<div class="mi'+(mA?' on':'')+'" onclick="goTo('+mi+',0)">'+
      '<div class="mi-hdr">'+
        '<div class="mi-ico">'+m.icon+'</div>'+
        '<div class="mi-info">'+
          '<div class="mi-name">'+m.title+'</div>'+
          '<div class="mi-meta"><span class="mi-id">'+m.id+'</span><span class="mi-t">~'+m.time+'m</span>'+foundBadge+'</div>'+
        '</div>'+
        '<div class="mi-ck'+(mD?' ok':'')+'">'+((mD)?'&#10003;':'')+'</div>'+
      '</div>'+secs+'</div>'
  }).join('');

  var secPct=Math.round((aS+1)/mod.sections.length*100);
  var hasHist=chats[key]&&chats[key].length>0;
  var taskBadge=sec.task?'<span class="badge badge-task">TASK</span>':'';
  var foundBadge=mod.tag==='foundation'?'<span class="badge badge-found">FOUNDATION</span>':'';

  document.getElementById('cti').innerHTML=
    '<div class="lhdr">'+
      '<div class="lcrumb">'+
        '<div class="lcrumb-mod">'+
          '<div class="lcrumb-ico">'+mod.icon+'</div>'+
          '<span style="color:var(--royal);font-weight:600;font-family:var(--mono);font-size:11px">'+mod.id+'</span>'+
          '<span style="color:var(--muted);font-family:var(--mono);font-size:11px">'+mod.title+'</span>'+
        '</div>'+
        '<span class="lcrumb-chev">&#8250;</span>'+
        '<span class="lcrumb-num">Section '+(aS+1)+' of '+mod.sections.length+'</span>'+
        taskBadge+foundBadge+
      '</div>'+
      '<div class="ltitle">'+sec.title+'</div>'+
      '<div class="lmeta">'+
        '<div class="lmi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>~'+mod.time+' min</div>'+
        '<div class="lmi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>'+mod.sections.length+' sections</div>'+
        (isDone?'<div class="lmi" style="color:var(--green)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Completed</div>':'')+
      '</div>'+
      '<div style="margin-top:12px"><button id="listen-btn" class="listen-btn" onclick="toggleListen()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Listen</button></div>'+
    '<div class="lpbar"><div class="lpfill" style="width:'+secPct+'%"></div></div>'+
    '</div>'+

    '<div class="btext">'+sec.content.split('\n\n').map(function(p){return '<p>'+p+'</p>'}).join('')+'</div>'+
    (sec.callout?renderCO(sec.callout):'')+
    (sec.callout2?renderCO(sec.callout2):'')+
    (sec.analogy?renderAN(sec.analogy):'')+
    (sec.numbers?renderCards(sec.numbers):'')+
    (sec.example?renderEx(sec.example):'')+
    (sec.checklist?renderCL(sec.checklist):'')+

    '<div class="fw">'+
      '<div class="fh">'+
        '<div class="fav-wrap"><div class="fav">&#127891;</div><div class="fon"></div></div>'+
        '<div class="finfo"><div class="fname">Ask Finn</div><div class="fsub">FDD Tutor - FieldForce Deal</div></div>'+
        '<div class="fai">AI TUTOR</div>'+
      '</div>'+
      '<div id="fmsgs" class="fmsgs'+(hasHist?' vis':'')+'"></div>'+
      (!hasHist?'<div id="fst" class="fst"><div class="fst-lbl">Ask Finn</div><div class="fst-g">'+
        mod.starters.map(function(q){return '<button class="fsbtn" onclick="finnSend(this.textContent)">'+q+'</button>'}).join('')+
      '</div></div>':'')+
      '<div class="fin">'+
        '<textarea id="fta" class="fta" placeholder="Ask Finn anything..." rows="1" onkeydown="finnKey(event)"></textarea>'+
        '<button class="fsnd" onclick="finnSubmit()"><svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>'+
      '</div>'+
    '</div>'+

    '<div class="lnav">'+
      '<button class="nbk" onclick="goBack()"'+(isFirst?' disabled':'')+'>'+
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg> Back'+
      '</button>'+
      '<button class="nnx'+(isDone?' done':'')+'" onclick="markDone()">'+
        (isDone?'Done - Next':'Mark done')+
        ' <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>'+
      '</button>'+
    '</div>';

  if(hasHist){finnRender(key);document.getElementById('fmsgs').classList.add('vis');}
}


// ── WEB SPEECH API ──────────────────────────────────────────────────
var synth = window.speechSynthesis;
var isPlaying = false;

function getReadableText() {
  var parts = [];
  var mod = MODULES[aM], sec = mod.sections[aS];
  parts.push(sec.title + '.');
  var cti = document.getElementById('cti');
  if (cti) {
    cti.querySelectorAll('.btext p').forEach(function(p) { if(p.textContent.trim()) parts.push(p.textContent.trim()); });
    cti.querySelectorAll('.co').forEach(function(c) { if(c.textContent.trim()) parts.push(c.textContent.trim()); });
    var an = cti.querySelector('.an-txt');
    if(an) parts.push('Analogy: ' + an.textContent.trim());
  }
  return parts.join(' ');
}

function toggleListen() {
  if (isPlaying) { stopSpeech(); return; }
  var text = getReadableText();
  if (!text) return;
  var u = new SpeechSynthesisUtterance(text);
  u.rate = 0.92; u.pitch = 1; u.volume = 1;
  var voices = synth.getVoices();
  var v = voices.find(function(x) { return x.lang.startsWith('en'); });
  if (v) u.voice = v;
  u.onstart = function() { isPlaying = true; updateListenBtn(true); };
  u.onend = function() { isPlaying = false; updateListenBtn(false); };
  u.onerror = function() { isPlaying = false; updateListenBtn(false); };
  synth.speak(u);
}

function updateListenBtn(playing) {
  var btn = document.getElementById('listen-btn');
  var sbtn = document.getElementById('stop-btn');
  if (!btn) return;
  if (playing) {
    btn.classList.add('playing');
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Playing...';
    if(sbtn) sbtn.style.display='flex';
  } else {
    btn.classList.remove('playing');
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Listen';
    if(sbtn) sbtn.style.display='none';
  }
}

function stopSpeech() {
  if (synth) synth.cancel();
  isPlaying = false;
  updateListenBtn(false);
}

render();

</script>
